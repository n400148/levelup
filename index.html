const sb = { auth: { getSession: async()=>({data:{session:null}}), onAuthStateChange: ()=>({data:{subscription:{unsubscribe:()=>{}}}}), signInWithPassword: async()=>({}), signUp: async()=>({}), signOut: async()=>({}) }, from: ()=>({ select: ()=>({ eq: ()=>({ eq: ()=>({ order: ()=>({data:[],error:null}), single: ()=>({data:null,error:null}) }) }) }) , upsert: async()=>({}), delete: ()=>({ eq: ()=>({ eq: ()=>({}) }) }) }) };

function useAI(){
  const [loading,setLoading] = useState(false);
  const [result,setResult] = useState(null);
  const ask = async prompt => {
    setLoading(true); setResult(null);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})
      });
      const d = await res.json();
      setResult(d.content?.map(b=>b.text||'').join('')||'No response.');
    } catch(e) { setResult('Could not reach AI.'); }
    setLoading(false);
  };
  return {ask,loading,result,setResult};
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function AuthScreen() {
  const [mode,setMode] = useState('login');
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [confirm,setConfirm] = useState('');
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState('');
  const [success,setSuccess] = useState('');

  const login = async () => {
    setError(''); setLoading(true);
    const {error} = await sb.auth.signInWithPassword({email,password});
    if(error) setError(error.message);
    setLoading(false);
  };
  const signup = async () => {
    setError('');
    if(password !== confirm){setError('Passwords do not match.');return;}
    if(password.length < 6){setError('Password must be at least 6 characters.');return;}
    setLoading(true);
    const {error} = await sb.auth.signUp({email,password});
    if(error) setError(error.message);
    else setSuccess('Account created! Check your email to confirm, then log in.');
    setLoading(false);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-grid"/>
      <div className="auth-box">
        <div className="auth-logo">LEVELUP</div>
        <div className="auth-sub">Performance Tracker</div>
        <div className="auth-toggle">
          <button className={`auth-toggle-btn${mode==='login'?' active':''}`} onClick={()=>{setMode('login');setError('');setSuccess('');}}>Login</button>

        <button className="auth-btn" onClick={mode==='login'?login:signup} disabled={loading}>

// ── WEIGHT TAB ────────────────────────────────────────────────────────────────
function WeightTab({weights,setWeights,deleteWeight,notes}) {
  const [date,setDate] = useState(today());
  const [weight,setWeight] = useState('');
  const ai = useAI();

  const add = async () => {
    if(!weight||isNaN(weight)) return;
    const entry = {date,weight:parseFloat(weight),id:`${date}-${Date.now()}`};
    const updated = [...weights.filter(w=>w.date!==date),entry].sort((a,b)=>a.date.localeCompare(b.date));
    await setWeights(updated); setWeight('');
  };

  const latest = weights[weights.length-1];
  const prev = weights[weights.length-2];
  const diff = latest&&prev ? +(latest.weight-prev.weight).toFixed(1) : null;
  const totalChange = weights.length>1 ? +(weights[weights.length-1].weight-weights[0].weight).toFixed(1) : null;
  const chartData = weights.slice(-60).map(w=>({date:fmt(w.date),weight:w.weight}));

  const analyze = () => {
    if(weights.length<3){ai.setResult('Log at least 3 weigh-ins for trend analysis.');return;}
    const recent = weights.slice(-14);
    const trend = +(recent[recent.length-1].weight-recent[0].weight).toFixed(1);
    const noteCtx = notes.slice(-5).map(n=>`${n.date}: "${n.text}"`).join('; ');
    ai.ask(`Body recomposition coach. Weight: ${recent.map(w=>`${w.date}:${w.weight}lbs`).join(',')}. 14d change: ${trend}lbs. Notes: ${noteCtx||'none'}. 3-4 sentences: assess trend, flag rate issues, recommend one adjustment. Account for creatine/peptide water weight. Numbers only.`);

  return (

        <div className="row">

          <div className="flex-1"><label className="section-label">Weight (lbs)</label><input type="number" className="input" placeholder="185.0" step="0.1" value={weight} onChange={e=>setWeight(e.target.value)}/></div>

        <div className="stat-grid">
          <div className="stat-box"><div className="stat-val">{latest?.weight}</div><div className="stat-lbl">Current</div></div>
          <div className="stat-box"><div className="stat-val" style={{color:diff>0?'#ff3d6b':diff<0?'#00e5a0':'#4a6080'}}>{diff!==null?(diff>0?`+${diff}`:diff):'—'}</div><div className="stat-lbl">Last Δ</div></div>
          <div className="stat-box"><div className="stat-val" style={{color:totalChange<0?'#00e5a0':totalChange>0?'#ff3d6b':'#4a6080'}}>{totalChange!==null?(totalChange>0?`+${totalChange}`:totalChange):'—'}</div><div className="stat-lbl">Total Δ</div></div>
        </div>
        <div className="card">
          <div className="card-title">📈 WEIGHT CHART</div>
          <ResponsiveContainer width="100%" height={190}>
            <AreaChart data={chartData} margin={{top:8,right:4,bottom:0,left:-18}}>
              <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#1e6bff" stopOpacity={0.35}/><stop offset="100%" stopColor="#1e6bff" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#0f1e35"/>
              <XAxis dataKey="date" tick={{fill:'#2a3d58',fontSize:9}} tickLine={false} axisLine={false}/>
              <YAxis tick={{fill:'#2a3d58',fontSize:9}} tickLine={false} axisLine={false} domain={['auto','auto']}/>
              <Tooltip content={<Tip/>}/>
              <Area type="monotone" dataKey="weight" stroke="#3d8bff" strokeWidth={2} fill="url(#wg)" dot={false} name="lbs" activeDot={{r:4,fill:'#3d8bff'}}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div className="card">
          <div className="card-title">◈ AI TREND ANALYSIS</div>
          <button className="btn btn-teal btn-small" onClick={analyze} style={{marginBottom:10}}>Analyze Trend</button>
          {ai.loading && <div className="ai-card"><div className="ai-label">Analyzing...</div></div>}
          {ai.result && <div className="ai-card"><div className="ai-label">AI Coach</div><div className="ai-text">{ai.result}</div></div>}
        </div>
        <div className="card">
          <div className="card-title">📋 HISTORY</div>
          {[...weights].reverse().slice(0,20).map((w,i,arr)=>{
            const nxt=arr[i+1]; const d=nxt?+(w.weight-nxt.weight).toFixed(1):null;
            return(<div key={w.date} className="log-item">
              <div><div className="log-date">{fmt(w.date)}</div><div><span className="log-val">{w.weight}</span><span className="log-unit">lbs</span></div></div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                {d!==null && <span className={`change-pill ${d>0?'cpup':d<0?'cpdown':'cpflat'}`}>{d>0?`+${d}`:d}</span>}
                <button className="btn btn-danger btn-small" onClick={()=>deleteWeight(w.date)}>✕</button>
              </div>
            </div>);
          })}
        </div>
      </>}
      {weights.length===0 && <div className="empty"><div className="empty-icon">⚖</div><div className="empty-txt">No weight logged yet.</div></div>}
    </>
  );
}

// ── WORKOUT TAB ───────────────────────────────────────────────────────────────
function WorkoutTab({logs,setLogs,deleteLog,plans,setPlans}) {
  const [screen,setScreen] = useState('select');
  const [sel,setSel] = useState(null);
  const [selDay,setSelDay] = useState('Day A');
  const [exercises,setExercises] = useState([]);
  const [openIdx,setOpenIdx] = useState(null);
  const [logDate,setLogDate] = useState(today());
  const [customEx,setCustomEx] = useState('');
  const [newDay,setNewDay] = useState('');
  const ai = useAI();

  const getPlanExs = () => plans[sel]?.[selDay]||[];
  const togglePlanEx = ex => {
    const cur = getPlanExs();
    const upd = cur.includes(ex)?cur.filter(e=>e!==ex):[...cur,ex];
    setPlans({...plans,[sel]:{...(plans[sel]||{}),[selDay]:upd}});
  };
  const openSplit = s => {
    if(!plans[s]) setPlans({...plans,[s]:{'Day A':[]}});
    setSel(s); setSelDay('Day A'); setScreen('plan');
  };
  const addDayVariant = () => {
    if(!newDay.trim()) return;
    setPlans({...plans,[sel]:{...(plans[sel]||{}),[newDay.trim()]:[]}}); setSelDay(newDay.trim()); setNewDay('');
  };
  const startLog = () => {
    setExercises(getPlanExs().map(name=>({name,sets:[{reps:'',weight:'',rpe:''}]})));
    setOpenIdx(null); setScreen('log');
  };
  const addSet = ei => { const u=[...exercises]; u[ei].sets.push({reps:'',weight:'',rpe:''}); setExercises(u); };
  const updSet = (ei,si,f,v) => { const u=[...exercises]; u[ei].sets[si][f]=v; setExercises(u); };
  const getPrev = name => logs.filter(l=>l.split===sel).flatMap(l=>(l.exercises||[]).filter(e=>e.name===name)).slice(-3);
  const getAI = ex => {
    const h = getPrev(ex.name);
    if(!h.length){ai.ask(`2-sentence progressive overload recommendation for ${ex.name}. Include rep range and starting weight.`);return;}
    const hist = h.map(h=>h.sets.map(s=>`${s.weight||'?'}lbs×${s.reps||'?'}`).join(',')).join(' → ');
    ai.ask(`Strength coach for "${ex.name}". History: ${hist}. 3 sentences: increase weight? How much? Optimal sets/reps? Note strength decreases.`);
  };
  const saveLog = async () => {
    if(!exercises.length) return;
    await setLogs([...logs,{date:logDate,split:sel,day:selDay,exercises,id:Date.now()}]);
    setExercises([]); setScreen('select');
  };

  if(screen==='select') return (
    <>
      <div className="card">
        <div className="card-title">🏋 SELECT SPLIT</div>
        <div className="split-grid">
          {SPLITS.map(s=>(
            <div key={s} className="split-card" onClick={()=>openSplit(s)}>
              <div className="split-icon">{splitIcon(s)}</div>
              <div className="split-name">{s}</div>
              <div className="split-count">{Object.keys(plans[s]||{}).length} variant(s) · {logs.filter(l=>l.split===s).length} sessions</div>
            </div>
          ))}
        </div>
      </div>
      {logs.length>0 && <div className="card">
        <div className="card-title">📅 RECENT SESSIONS</div>
        {[...logs].reverse().slice(0,6).map(log=>(
          <div key={log.id} className="log-item" style={{flexDirection:'column',alignItems:'flex-start'}}>
            <div style={{display:'flex',width:'100%',justifyContent:'space-between',alignItems:'center'}}>
              <div><div className="log-date">{fmt(log.date)}</div><div style={{fontWeight:700,fontSize:15}}>{log.split} — {log.day}</div><div style={{fontSize:12,color:'#4a6080',marginTop:2}}>{(log.exercises||[]).length} exercises</div></div>
              <button className="btn btn-danger btn-small" onClick={()=>deleteLog(log.id)}>✕</button>
            </div>
          </div>
        ))}
      </div>}
    </>
  );

  if(screen==='plan') return (
    <>
      <button className="back-btn" onClick={()=>setScreen('select')}>← Back</button>
      <div className="card">
        <div className="card-title">📋 {sel?.toUpperCase()} — PLAN</div>
        <div className="day-tabs">
          {Object.keys(plans[sel]||{}).map(d=><div key={d} className={`day-tab${selDay===d?' active':''}`} onClick={()=>setSelDay(d)}>{d}</div>)}
        </div>
        <div className="row" style={{marginBottom:12}}>
          <input className="input flex-1" placeholder="New variant (e.g. Day B)" value={newDay} onChange={e=>setNewDay(e.target.value)} style={{fontSize:13}}/>
          <button className="btn btn-secondary btn-small" onClick={addDayVariant}>+ Add</button>
        </div>
        <label className="section-label">Exercises for {selDay}</label>
        <div style={{display:'flex',flexWrap:'wrap',marginBottom:10}}>
          {(EXERCISES[sel]||EXERCISES.Push).map(ex=><span key={ex} className={`chip${getPlanExs().includes(ex)?' sel':''}`} onClick={()=>togglePlanEx(ex)}>{ex}</span>)}
        </div>
        {getPlanExs().length>0 && <div style={{marginBottom:10}}>
          <label className="section-label">Selected ({getPlanExs().length})</label>
          {getPlanExs().map(ex=>(
            <div key={ex} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #0f1e35'}}>
              <span style={{fontSize:13,fontWeight:600}}>{ex}</span>
              <button className="btn btn-danger btn-small" onClick={()=>togglePlanEx(ex)}>✕</button>
            </div>
          ))}
        </div>}
        <button className="btn btn-primary" onClick={startLog} disabled={!getPlanExs().length} style={{marginTop:12}}>START {selDay} →</button>
      </div>
    </>
  );

  return (
    <>
      <button className="back-btn" onClick={()=>setScreen('plan')}>← Back to Plan</button>
      <div className="card">
        <div className="card-title">⚡ {sel?.toUpperCase()} — {selDay}</div>
        <label className="section-label">Session Date</label>
        <input type="date" className="input" value={logDate} onChange={e=>setLogDate(e.target.value)}/>
        <div className="row" style={{marginTop:10}}>
          <input className="input flex-1" placeholder="Add extra exercise..." value={customEx} onChange={e=>setCustomEx(e.target.value)} style={{fontSize:13}}/>
          <button className="btn btn-secondary btn-small" onClick={()=>{if(customEx){setExercises([...exercises,{name:customEx,sets:[{reps:'',weight:'',rpe:''}]}]);setCustomEx('');setOpenIdx(exercises.length);}}}>+ Add</button>
        </div>
      </div>
      {exercises.map((ex,ei)=>{
        const prev = getPrev(ex.name);
        return (
          <div key={ex.name+ei} className="exercise-row">
            <div className={`exercise-hdr${openIdx===ei?' open':''}`} onClick={()=>setOpenIdx(openIdx===ei?null:ei)}>
              <div><div className="ex-name">{ex.name}</div><div className="ex-meta">{ex.sets.length} sets · {prev.length>0?`${prev.length} prev sessions`:'No history'}</div></div>
              <span style={{color:'#2a3d58',fontSize:14}}>{openIdx===ei?'▲':'▼'}</span>
            </div>
            {openIdx===ei && <div className="exercise-body">
              {prev.length>0 && <div className="prev-box">
                <div className="prev-lbl">Previous Sessions</div>
                {prev.slice(-2).reverse().map((p,pi)=><div key={pi} className="prev-row">Session -{pi+1}: {p.sets.map((s,si)=>`S${si+1} ${s.weight||'?'}×${s.reps||'?'}`).join(' | ')}</div>)}
              </div>}
              <div style={{display:'grid',gridTemplateColumns:'24px 1fr 1fr 1fr auto',gap:5,marginBottom:4}}>
                <div/>{['Reps','Weight','RPE'].map(l=><div key={l} style={{fontSize:9,color:'#2a3d58',textAlign:'center',textTransform:'uppercase',letterSpacing:1,fontWeight:700}}>{l}</div>)}<div/>
              </div>
              {ex.sets.map((s,si)=>(
                <div key={si} className="set-grid">
                  <div className="set-num">{si+1}</div>
                  <input className="set-inp" type="number" placeholder="10" value={s.reps} onChange={e=>updSet(ei,si,'reps',e.target.value)}/>
                  <input className="set-inp" type="number" placeholder="135" value={s.weight} onChange={e=>updSet(ei,si,'weight',e.target.value)}/>
                  <input className="set-inp" type="number" placeholder="7" step="0.5" value={s.rpe} onChange={e=>updSet(ei,si,'rpe',e.target.value)}/>
                  <button style={{background:'none',border:'none',color:'#ff3d6b',cursor:'pointer',fontSize:14}} onClick={()=>{const u=[...exercises];if(u[ei].sets.length>1)u[ei].sets.splice(si,1);setExercises(u);}}>✕</button>
                </div>
              ))}
              <div className="row" style={{marginTop:8,flexWrap:'wrap',gap:6}}>
                <button className="btn btn-secondary btn-small" onClick={()=>addSet(ei)}>+ Set</button>
                <button className="btn btn-teal btn-small" onClick={()=>getAI(ex)}>◈ AI Advice</button>
                <button className="btn btn-danger btn-small" onClick={()=>{const u=[...exercises];u.splice(ei,1);setExercises(u);setOpenIdx(null);}}>Remove</button>
              </div>
              {ai.loading && openIdx===ei && <div className="ai-card" style={{marginTop:8}}><div className="ai-label">Analyzing...</div></div>}
              {ai.result && openIdx===ei && <div className="ai-card" style={{marginTop:8}}><div className="ai-label">Progression Advice</div><div className="ai-text">{ai.result}</div></div>}
            </div>}
          </div>
        );
      })}
      {exercises.length>0 && <button className="btn btn-primary" style={{marginTop:12}} onClick={saveLog}>💾 SAVE SESSION</button>}
    </>
  );
}

// ── NUTRITION TAB ─────────────────────────────────────────────────────────────
function NutritionTab({nutrition,setNutrition,deleteNutrition,weights,scans,notes}) {
  const [date,setDate] = useState(today());
  const [form,setForm] = useState({calories:'',protein:'',carbs:'',fats:'',water:''});
  const ai = useAI();
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const save = async () => {
    if(!form.calories) return;
    const entry = {date,...form,id:`${date}-${Date.now()}`};
    await setNutrition([...nutrition.filter(n=>n.date!==date),entry].sort((a,b)=>a.date.localeCompare(b.date)));
    setForm({calories:'',protein:'',carbs:'',fats:'',water:''});
  };
  const latest = nutrition[nutrition.length-1];
  const chartData = nutrition.slice(-30).map(n=>({date:fmt(n.date),cal:parseFloat(n.calories)||0}));
  const getAdvice = () => {
    const recent = nutrition.slice(-14);
    const avgCal = recent.length?Math.round(recent.reduce((a,n)=>a+(parseFloat(n.calories)||0),0)/recent.length):0;
    const avgProt = recent.length?Math.round(recent.reduce((a,n)=>a+(parseFloat(n.protein)||0),0)/recent.length):0;
    const wt = weights.slice(-14); const wChange = wt.length>1?+(wt[wt.length-1].weight-wt[0].weight).toFixed(1):0;
    const ls = scans[scans.length-1];
    const noteCtx = notes.slice(-5).map(n=>`${n.date}: "${n.text}"`).join('; ');
    ai.ask(`Nutrition coach. Avg cal: ${avgCal} kcal/day, protein: ${avgProt}g/day, 14d weight change: ${wChange}lbs, scan: ${ls?`${ls.weight}lbs ${ls.bf}% BF ${ls.lmm}lbs LMM`:'none'}, notes: ${noteCtx||'none'}. 5 points: 1)calorie adjustment 2)protein target 3)carb/fat split 4)note adjustments 5)priority action. Numbers.`);
  };
  return (
    <>
      <div className="card">
        <div className="card-title">🍽 LOG NUTRITION</div>
        <label className="section-label">Date</label>
        <input type="date" className="input" value={date} onChange={e=>setDate(e.target.value)}/>
        <div className="row" style={{marginTop:10}}>
          <div className="flex-1"><label className="section-label">Calories</label><input type="number" className="input" placeholder="2400" value={form.calories} onChange={e=>upd('calories',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">Protein (g)</label><input type="number" className="input" placeholder="180" value={form.protein} onChange={e=>upd('protein',e.target.value)}/></div>
        </div>
        <div className="row" style={{marginTop:8}}>
          <div className="flex-1"><label className="section-label">Carbs (g)</label><input type="number" className="input" placeholder="250" value={form.carbs} onChange={e=>upd('carbs',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">Fats (g)</label><input type="number" className="input" placeholder="80" value={form.fats} onChange={e=>upd('fats',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">Water (oz)</label><input type="number" className="input" placeholder="100" value={form.water} onChange={e=>upd('water',e.target.value)}/></div>
        </div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={save}>LOG DAY</button></div>
      </div>
      {latest && <div className="card">
        <div className="card-title">📊 LATEST MACROS</div>
        {[{label:'Calories',val:`${latest.calories} kcal`,pct:Math.min((latest.calories/3000)*100,100),color:'#3d8bff'},{label:'Protein',val:`${latest.protein}g`,pct:Math.min((latest.protein/250)*100,100),color:'#00e5a0'},{label:'Carbs',val:`${latest.carbs}g`,pct:Math.min((latest.carbs/350)*100,100),color:'#00c2ff'},{label:'Fats',val:`${latest.fats}g`,pct:Math.min((latest.fats/100)*100,100),color:'#ff3d6b'},{label:'Water',val:`${latest.water}oz`,pct:Math.min((latest.water/128)*100,100),color:'#4a9eff'}].map(m=>(
          <div key={m.label} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <div style={{fontSize:11,color:'#4a6080',width:70,fontWeight:700,textTransform:'uppercase'}}>{m.label}</div>
            <div style={{flex:1,height:6,background:'#111d33',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',borderRadius:3,background:m.color,width:`${m.pct}%`}}/></div>
            <div style={{fontSize:12,fontWeight:700,color:m.color,width:70,textAlign:'right'}}>{m.val}</div>
          </div>
        ))}
      </div>}
      {chartData.length>1 && <div className="card">
        <div className="card-title">📈 CALORIE TREND</div>
        <ResponsiveContainer width="100%" height={150}>
          <AreaChart data={chartData} margin={{top:4,right:4,bottom:0,left:-18}}>
            <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#1e6bff" stopOpacity={0.3}/><stop offset="100%" stopColor="#1e6bff" stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#0f1e35"/>
            <XAxis dataKey="date" tick={{fill:'#2a3d58',fontSize:9}} tickLine={false} axisLine={false}/>
            <YAxis tick={{fill:'#2a3d58',fontSize:9}} tickLine={false} axisLine={false}/>
            <Tooltip content={<Tip/>}/>
            <Area type="monotone" dataKey="cal" stroke="#3d8bff" strokeWidth={2} fill="url(#cg)" dot={false} name="kcal"/>
          </AreaChart>
        </ResponsiveContainer>
      </div>}
      <div className="card">
        <div className="card-title">◈ AI MACRO ADVISOR</div>
        <button className="btn btn-teal btn-small" style={{marginBottom:10}} onClick={getAdvice}>Get Recommendations</button>
        {ai.loading && <div className="ai-card"><div className="ai-label">Calculating...</div></div>}
        {ai.result && <div className="ai-card"><div className="ai-label">Nutrition Plan</div><div className="ai-text">{ai.result}</div></div>}
      </div>
      {nutrition.length>0 && <div className="card">
        <div className="card-title">📋 HISTORY</div>
        {[...nutrition].reverse().slice(0,14).map(n=>(
          <div key={n.id||n.date} className="log-item">
            <div><div className="log-date">{fmt(n.date)}</div><div style={{fontWeight:700,fontSize:15}}>{n.calories}<span style={{color:'#4a6080',fontSize:12}}> kcal</span></div><div style={{fontSize:11,color:'#4a6080',marginTop:2}}>P:{n.protein}g C:{n.carbs}g F:{n.fats}g</div></div>
            <button className="btn btn-danger btn-small" onClick={()=>deleteNutrition(n.id,n.date)}>✕</button>
          </div>
        ))}
      </div>}
      {nutrition.length===0 && <div className="empty"><div className="empty-icon">🍽</div><div className="empty-txt">No nutrition logged yet.</div></div>}
    </>
  );
}

// ── BODY TAB ──────────────────────────────────────────────────────────────────
function BodyTab({scans,setScans,deleteScan}) {
  const [form,setForm] = useState({date:today(),weight:'',bf:'',lmm:'',height:'',goal_bf:''});
  const ai = useAI();
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const add = async () => {
    if(!form.bf||!form.weight) return;
    await setScans([...scans,{...form,id:Date.now()}].sort((a,b)=>a.date.localeCompare(b.date)));
    setForm(f=>({...f,weight:'',bf:'',lmm:''}));
  };
  const latest = scans[scans.length-1]; const prev = scans[scans.length-2];
  const goalBF = parseFloat(latest?.goal_bf)||10; const currentBF = latest?parseFloat(latest.bf):null;
  const chartData = scans.map(s=>({date:fmt(s.date),bf:parseFloat(s.bf),lmm:parseFloat(s.lmm)||0}));
  const analyze = () => {
    if(!latest) return;
    const ctx = scans.slice(-4).map(s=>`${s.date}: ${s.weight}lbs, ${s.bf}% BF, LMM: ${s.lmm}lbs`).join(' | ');
    ai.ask(`Body comp coach. Scans: ${ctx}. Goal: ${goalBF}% BF. 4 sentences: trajectory, weeks to goal, muscle loss concern, one adjustment. Numbers.`);
  };
  const radius=38, circ=2*Math.PI*radius;
  const bfDash = currentBF?circ*(1-Math.min(currentBF/35,1)):circ;
  return (
    <>
      <div className="card">
        <div className="card-title">📊 LOG BODY SCAN</div>
        <div className="row">
          <div className="flex-1"><label className="section-label">Date</label><input type="date" className="input" value={form.date} onChange={e=>upd('date',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">Height (in)</label><input type="number" className="input" placeholder="70" value={form.height} onChange={e=>upd('height',e.target.value)}/></div>
        </div>
        <div className="row" style={{marginTop:8}}>
          <div className="flex-1"><label className="section-label">Weight (lbs)</label><input type="number" className="input" placeholder="185" step="0.1" value={form.weight} onChange={e=>upd('weight',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">Body Fat %</label><input type="number" className="input" placeholder="18" step="0.1" value={form.bf} onChange={e=>upd('bf',e.target.value)}/></div>
        </div>
        <div className="row" style={{marginTop:8}}>
          <div className="flex-1"><label className="section-label">Lean Mass (lbs)</label><input type="number" className="input" placeholder="148" step="0.1" value={form.lmm} onChange={e=>upd('lmm',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">BF% Goal</label><input type="number" className="input" placeholder="10" step="0.5" value={form.goal_bf} onChange={e=>upd('goal_bf',e.target.value)}/></div>
        </div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={add}>LOG SCAN</button></div>
      </div>
      {latest && <>
        <div className="card" style={{textAlign:'center'}}>
          <div className="card-title" style={{justifyContent:'center'}}>🎯 GOAL PROGRESS</div>
          <div style={{display:'flex',justifyContent:'center',marginBottom:10}}>

// ── PEPTIDE TAB ───────────────────────────────────────────────────────────────
function PeptideTab({peptides,setPeptides,deletePeptide}) {
  const [form,setForm] = useState({name:'',custom:'',dose:'',unit:'mcg',freq:'Daily',startDate:today(),endDate:'',notes:''});
  const ai = useAI();
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const add = async () => {
    const name = form.name==='Custom'?form.custom:form.name;
    if(!name||!form.dose) return;
    await setPeptides([...peptides,{...form,name,id:Date.now()}]);
    setForm({name:'',custom:'',dose:'',unit:'mcg',freq:'Daily',startDate:today(),endDate:'',notes:''});
  };
  const isActive = p => !p.endDate||p.endDate>=today();
  const daysOn = p => Math.round((new Date((p.endDate||today())+'T12:00:00')-new Date(p.startDate+'T12:00:00'))/86400000);
  const getInfo = p => ai.ask(`Peptide research for ${p.name} at ${p.dose}${p.unit} ${p.freq}. 4 sentences: mechanism for fat loss, timeline, key considerations, optimization tip.`);
  return (
    <>
      <div className="card">
        <div className="card-title">💉 LOG PROTOCOL</div>
        <label className="section-label">Peptide</label>
        <select className="input" value={form.name} onChange={e=>upd('name',e.target.value)}>
          <option value="">Select peptide...</option>
          {PEPTIDES_LIST.map(p=><option key={p}>{p}</option>)}
          <option value="Custom">Custom...</option>
        </select>
        {form.name==='Custom' && <input className="input" style={{marginTop:8}} placeholder="Peptide name" value={form.custom} onChange={e=>upd('custom',e.target.value)}/>}
        <div className="row" style={{marginTop:10}}>
          <div className="flex-1"><label className="section-label">Dose</label><input type="number" className="input" placeholder="500" value={form.dose} onChange={e=>upd('dose',e.target.value)}/></div>
          <div style={{width:80}}><label className="section-label">Unit</label><select className="input" value={form.unit} onChange={e=>upd('unit',e.target.value)}>{['mcg','mg','IU','ml'].map(u=><option key={u}>{u}</option>)}</select></div>
          <div style={{width:100}}><label className="section-label">Freq</label><select className="input" value={form.freq} onChange={e=>upd('freq',e.target.value)}>{['Daily','2x/day','EOD','3x/week','Weekly','As needed'].map(f=><option key={f}>{f}</option>)}</select></div>
        </div>
        <div className="row" style={{marginTop:10}}>
          <div className="flex-1"><label className="section-label">Start</label><input type="date" className="input" value={form.startDate} onChange={e=>upd('startDate',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">End (opt)</label><input type="date" className="input" value={form.endDate} onChange={e=>upd('endDate',e.target.value)}/></div>
        </div>
        <div style={{marginTop:10}}><label className="section-label">Notes</label><input className="input" placeholder="Timing, rotation, etc." value={form.notes} onChange={e=>upd('notes',e.target.value)}/></div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={add}>ADD TO PROTOCOL</button></div>
      </div>
      {peptides.filter(isActive).length>0 && <div className="card">
        <div className="card-title" style={{color:'#00e5a0'}}>● ACTIVE STACK</div>
        {peptides.filter(isActive).map(p=>(
          <div key={p.id} style={{background:'#0d1424',border:'1px solid #111d33',borderRadius:10,padding:14,marginBottom:8}}>
            <div style={{fontWeight:700,fontSize:16,color:'#00c2ff',marginBottom:4}}>{p.name}</div>
            <div style={{fontSize:12,color:'#4a6080',marginBottom:2}}>💊 {p.dose}{p.unit} · {p.freq}</div>
            <div style={{fontSize:12,color:'#4a6080',marginBottom:2}}>📅 Started {fmt(p.startDate)}</div>
            {p.notes && <div style={{fontSize:12,color:'#4a6080',marginBottom:2}}>📝 {p.notes}</div>}
            <div style={{display:'inline-block',background:'rgba(0,194,255,0.1)',border:'1px solid rgba(0,194,255,0.25)',color:'#00c2ff',borderRadius:5,padding:'3px 9px',fontSize:11,fontWeight:700,marginTop:6}}>Day {daysOn(p)}</div>
            <div className="row" style={{marginTop:10,gap:6}}>
              <button className="btn btn-teal btn-small" onClick={()=>getInfo(p)}>◈ Research</button>
              <button className="btn btn-danger btn-small" onClick={()=>setPeptides(peptides.map(x=>x.id===p.id?{...x,endDate:today()}:x))}>End</button>
              <button className="btn btn-danger btn-small" onClick={()=>deletePeptide(p.id)}>✕</button>
            </div>
          </div>
        ))}
        {ai.loading && <div className="ai-card"><div className="ai-label">Researching...</div></div>}
        {ai.result && <div className="ai-card"><div className="ai-label">Research Brief</div><div className="ai-text">{ai.result}</div></div>}
      </div>}
      {peptides.length===0 && <div className="empty"><div className="empty-icon">💉</div><div className="empty-txt">No protocols logged yet.</div></div>}
    </>
  );
}

// ── INSIGHTS TAB ──────────────────────────────────────────────────────────────
function InsightsTab({weights,logs,scans,peptides,nutrition,notes}) {
  const ai = useAI();
  const thisWeek = logs.filter(l=>Math.round((new Date()-new Date(l.date+'T12:00:00'))/86400000)<=7).length;
  const activePeptides = peptides.filter(p=>!p.endDate||p.endDate>=today());
  const latestScan = scans[scans.length-1];
  const avgCal = nutrition.slice(-7).length?Math.round(nutrition.slice(-7).reduce((a,n)=>a+(parseFloat(n.calories)||0),0)/nutrition.slice(-7).length):0;
  const wt7 = weights.slice(-7); const wChange7 = wt7.length>1?+(wt7[wt7.length-1].weight-wt7[0].weight).toFixed(1):null;
  const fullBrief = () => {
    const wt = weights.slice(-14).map(w=>`${w.date}:${w.weight}lbs`).join(',');
    const scan = latestScan?`${latestScan.weight}lbs, ${latestScan.bf}% BF, ${latestScan.lmm}lbs LMM`:'none';
    const stack = activePeptides.map(p=>`${p.name} ${p.dose}${p.unit} ${p.freq}`).join(', ')||'none';
    const noteCtx = notes.slice(-6).map(n=>`${n.date} [${n.tag}]: ${n.text}`).join(' | ')||'none';
    ai.ask(`Elite fitness coach. Weight 14d: ${wt}. Scan: ${scan}. Peptides: ${stack}. Avg cal 7d: ${avgCal} kcal. Training: ${thisWeek}/week, ${logs.length} total. Notes: ${noteCtx}. 5-point brief: 1)TRAJECTORY 2)TRAINING 3)NUTRITION 4)PROTOCOL 5)PRIORITY ACTION. Specific numbers.`);
  };
  const iRow = (icon,bg,title,body) => (
    <div style={{display:'flex',gap:10,padding:'10px 0',borderBottom:'1px solid #111d33'}}>
      <div style={{width:34,height:34,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0,marginTop:2,background:bg}}>{icon}</div>
      <div><div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{title}</div><div style={{fontSize:12,color:'#3a5070',lineHeight:1.5}}>{body}</div></div>
    </div>
  );
  return (
    <>
      <div className="stat-grid">
        <div className="stat-box"><div className="stat-val">{logs.length}</div><div className="stat-lbl">Sessions</div></div>
        <div className="stat-box"><div className="stat-val">{thisWeek}</div><div className="stat-lbl">This Week</div></div>
        <div className="stat-box"><div className="stat-val" style={{color:'#00c2ff'}}>{activePeptides.length}</div><div className="stat-lbl">Peptides</div></div>
      </div>
      <div className="stat-grid">
        <div className="stat-box"><div className="stat-val" style={{color:wChange7<0?'#00e5a0':wChange7>0?'#ff3d6b':'#4a6080'}}>{wChange7!==null?(wChange7>0?`+${wChange7}`:wChange7):'—'}</div><div className="stat-lbl">7d Wt Δ</div></div>
        <div className="stat-box"><div className="stat-val">{avgCal||'—'}</div><div className="stat-lbl">Avg kcal</div></div>
        <div className="stat-box"><div className="stat-val" style={{color:'#ff3d6b'}}>{latestScan?.bf?`${latestScan.bf}%`:'—'}</div><div className="stat-lbl">Last BF%</div></div>
      </div>
      <div className="card">
        <div className="card-title">💡 AUTO INSIGHTS</div>
        {iRow('⚖','rgba(30,107,255,0.12)','Weight Trend',wChange7!==null?`7-day: ${wChange7>0?'+':''}${wChange7} lbs. ${Math.abs(wChange7)<=1.5?'Rate looks sustainable.':Math.abs(wChange7)>2.5?'Rate is aggressive — verify calories and muscle retention.':'Slightly high — monitor closely.'}`:'Log at least 7 weigh-ins.')}
        {iRow('🏋','rgba(0,194,255,0.12)','Training',thisWeek>=5?`${thisWeek}/7 days — excellent.`:thisWeek>=3?`${thisWeek}/7 days — push toward 5-6.`:`${thisWeek}/7 days — aim for 5-6 days/week.`)}
        {iRow('🍽','rgba(0,229,160,0.12)','Nutrition',avgCal>0?`7-day avg: ${avgCal} kcal. ${wChange7>1?'Rising — cut 150-200 kcal.':wChange7<-1.5?'Dropping fast — check protein.':'Calibrated.'}`:'Log nutrition to get recommendations.')}
        {iRow('💉','rgba(0,194,255,0.12)','Protocol',activePeptides.length>0?`Active: ${activePeptides.map(p=>p.name).join(', ')}.`:'No active protocols logged.')}
        {notes.length>0 && iRow('📝','rgba(30,107,255,0.12)','Latest Note',`${notes[notes.length-1]?.text?.slice(0,100)}${notes[notes.length-1]?.text?.length>100?'…':''}`)}
      </div>
      <div className="card">
        <div className="card-title">◈ FULL AI BRIEF</div>
        <div style={{fontSize:12,color:'#4a6080',marginBottom:10}}>Synthesizes all your data for a complete coaching assessment.</div>
        <button className="btn btn-primary" onClick={fullBrief}>GENERATE COACHING BRIEF</button>
        {ai.loading && <div className="ai-card" style={{marginTop:10}}><div className="ai-label">Processing all data...</div></div>}
        {ai.result && <div className="ai-card" style={{marginTop:10}}><div className="ai-label">Coaching Brief</div><div className="ai-text">{ai.result}</div></div>}
      </div>
    </>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [session,setSession] = useState(null);
  const [appLoading,setAppLoading] = useState(true);
  const [tab,setTab] = useState(0);
  const [weights,setWeightsS] = useState([]);
  const [logs,setLogsS] = useState([]);
  const [plans,setPlansS] = useState({});
  const [nutrition,setNutritionS] = useState([]);
  const [scans,setScansS] = useState([]);
  const [peptides,setPeptidesS] = useState([]);
  const [notes,setNotesS] = useState([]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{ setSession(session); setAppLoading(false); });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{ if(session) loadAll(); },[session]);

  const uid = () => session?.user?.id;

  const loadAll = async () => {
    const u = uid(); if(!u) return;
    try {
      const [w,l,p,n,s,pep,nt] = await Promise.all([
        sb.from('weights').select('*').eq('user_id',u).order('date'),
        sb.from('workout_logs').select('*').eq('user_id',u).order('date'),
        sb.from('workout_plans').select('*').eq('user_id',u).single(),
        sb.from('nutrition').select('*').eq('user_id',u).order('date'),
        sb.from('body_scans').select('*').eq('user_id',u).order('date'),
        sb.from('peptides').select('*').eq('user_id',u).order('start_date'),
        sb.from('notes').select('*').eq('user_id',u).order('date'),
      ]);
      if(w.data) setWeightsS(w.data);
      if(l.data) setLogsS(l.data.map(r=>({...r,exercises:r.exercises||[]})));
      if(p.data) setPlansS(p.data.plans||{});
      if(n.data) setNutritionS(n.data);
      if(s.data) setScansS(s.data);
      if(pep.data) setPeptidesS(pep.data);
      if(nt.data) setNotesS(nt.data);
    } catch(e) { console.error(e); }
  };

  const setWeights = async rows => { setWeightsS(rows); await sb.from('weights').upsert(rows.map(r=>({...r,user_id:uid()})),{onConflict:'user_id,date'}); };
  const deleteWeight = async date => { setWeightsS(w=>w.filter(x=>x.date!==date)); await sb.from('weights').delete().eq('user_id',uid()).eq('date',date); };
  const setLogs = async rows => { setLogsS(rows); await sb.from('workout_logs').upsert(rows.map(r=>({...r,user_id:uid(),exercises:r.exercises||[]})),{onConflict:'id'}); };
  const deleteLog = async id => { setLogsS(l=>l.filter(x=>x.id!==id)); await sb.from('workout_logs').delete().eq('id',id).eq('user_id',uid()); };
  const setPlans = async p => { setPlansS(p); await sb.from('workout_plans').upsert({user_id:uid(),plans:p},{onConflict:'user_id'}); };
  const setNutrition = async rows => { setNutritionS(rows); await sb.from('nutrition').upsert(rows.map(r=>({...r,user_id:uid()})),{onConflict:'user_id,date'}); };
  const deleteNutrition = async (id,date) => { setNutritionS(n=>n.filter(x=>(x.id||x.date)!==(id||date))); if(id) await sb.from('nutrition').delete().eq('id',id).eq('user_id',uid()); else await sb.from('nutrition').delete().eq('date',date).eq('user_id',uid()); };
  const setScans = async rows => { setScansS(rows); await sb.from('body_scans').upsert(rows.map(r=>({...r,user_id:uid()})),{onConflict:'id'}); };
  const deleteScan = async id => { setScansS(s=>s.filter(x=>x.id!==id)); await sb.from('body_scans').delete().eq('id',id).eq('user_id',uid()); };
  const setPeptides = async rows => { setPeptidesS(rows); await sb.from('peptides').upsert(rows.map(r=>({...r,user_id:uid()})),{onConflict:'id'}); };
  const deletePeptide = async id => { setPeptidesS(p=>p.filter(x=>x.id!==id)); await sb.from('peptides').delete().eq('id',id).eq('user_id',uid()); };
  const setNotes = async rows => { setNotesS(rows); await sb.from('notes').upsert(rows.map(r=>({...r,user_id:uid()})),{onConflict:'id'}); };
  const deleteNote = async id => { setNotesS(n=>n.filter(x=>x.id!==id)); await sb.from('notes').delete().eq('id',id).eq('user_id',uid()); };

  const TABS = [{icon:'⚖',label:'Weight'},{icon:'🏋',label:'Train'},{icon:'🍽',label:'Nutrition'},{icon:'📊',label:'Body'},{icon:'💉',label:'Stack'},{icon:'📝',label:'Notes'},{icon:'💡',label:'Insights'}];

  if(appLoading) return (
    <div style={{minHeight:'100vh',background:'#000',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{fontFamily:'Rajdhani,sans-serif',color:'#1e6bff',fontSize:14,letterSpacing:3,textTransform:'uppercase'}}>Loading...</div>
    </div>
  );

  if(!session) return <AuthScreen/>;

  return (
    <div className="app">
      <div className="header">
        <div className="header-inner">
          <div><div className="logo">LEVELUP</div><div className="logo-sub">Performance Tracker</div></div>
          <div className="header-right">
            <div className="live-dot">Live</div>
            <button className="signout-btn" onClick={()=>sb.auth.signOut()}>Sign Out</button>
          </div>
        </div>
      </div>
      <div className="content">
        {tab===0 && <WeightTab weights={weights} setWeights={setWeights} deleteWeight={deleteWeight} notes={notes}/>}
        {tab===1 && <WorkoutTab logs={logs} setLogs={setLogs} deleteLog={deleteLog} plans={plans} setPlans={setPlans}/>}
        {tab===2 && <NutritionTab nutrition={nutrition} setNutrition={setNutrition} deleteNutrition={deleteNutrition} weights={weights} scans={scans} notes={notes}/>}
        {tab===3 && <BodyTab scans={scans} setScans={setScans} deleteScan={deleteScan}/>}
        {tab===4 && <PeptideTab peptides={peptides} setPeptides={setPeptides} deletePeptide={deletePeptide}/>}
        {tab===5 && <NotesTab notes={notes} setNotes={setNotes} deleteNote={deleteNote}/>}
        {tab===6 && <InsightsTab weights={weights} logs={logs} scans={scans} peptides={peptides} nutrition={nutrition} notes={notes}/>}
      </div>
      <div className="tabs">
        {TABS.map((t,i)=>(
          <button key={i} className={`tab${tab===i?' active':''}`} onClick={()=>setTab(i)}>
            <span className="tab-icon">{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
