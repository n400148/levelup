<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ── SUPABASE (loaded via CDN after page load) ─────────────────────────────────
const SUPABASE_URL = 'https://uorwaxkedqvogfeghjnu.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_UOYqW1KMvsyaY8aDUMDSPg_98zk-SAx';

// Simple Supabase wrapper using fetch directly — no CDN needed
const sb = {
  _headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
  _authHeaders: () => {
    const t = localStorage.getItem('sb_token');
    return { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${t||SUPABASE_ANON_KEY}` };
  },
  auth: {
    _listeners: [],
    _session: null,
    getSession: async () => {
      const token = localStorage.getItem('sb_token');
      const user = localStorage.getItem('sb_user');
      if(token && user) {
        sb.auth._session = { access_token: token, user: JSON.parse(user) };
        return { data: { session: sb.auth._session } };
      }
      return { data: { session: null } };
    },
    onAuthStateChange: (cb) => {
      sb.auth._listeners.push(cb);
      return { data: { subscription: { unsubscribe: () => { sb.auth._listeners = sb.auth._listeners.filter(l=>l!==cb); } } } };
    },
    _notify: (session) => {
      sb.auth._session = session;
      sb.auth._listeners.forEach(cb => cb('SIGNED_IN', session));
    },
    signInWithPassword: async ({ email, password }) => {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if(data.access_token) {
        localStorage.setItem('sb_token', data.access_token);
        localStorage.setItem('sb_user', JSON.stringify(data.user));
        sb.auth._notify({ access_token: data.access_token, user: data.user });
        return { data, error: null };
      }
      return { data: null, error: { message: data.error_description || data.msg || 'Login failed' } };
    },
    signUp: async ({ email, password }) => {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if(data.id || data.access_token) {
        if(data.access_token) {
          localStorage.setItem('sb_token', data.access_token);
          localStorage.setItem('sb_user', JSON.stringify(data.user||data));
          sb.auth._notify({ access_token: data.access_token, user: data.user||data });
        }
        return { data, error: null };
      }
      return { data: null, error: { message: data.error_description || data.msg || 'Signup failed' } };
    },
    signOut: async () => {
      localStorage.removeItem('sb_token');
      localStorage.removeItem('sb_user');
      sb.auth._session = null;
      sb.auth._listeners.forEach(cb => cb('SIGNED_OUT', null));
      return { error: null };
    }
  },
  from: (table) => ({
    select: (cols='*') => ({
      eq: (col, val) => ({
        eq: (col2, val2) => ({
          order: async (orderCol) => {
            const uid = sb.auth._session?.user?.id;
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${val}&${col2}=eq.${val2}&order=${orderCol}`, { headers: sb._authHeaders() });
            const data = await res.json();
            return { data: Array.isArray(data) ? data : [], error: null };
          },
          single: async () => {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${val}&${col2}=eq.${val2}&limit=1`, { headers: sb._authHeaders() });
            const data = await res.json();
            return { data: Array.isArray(data) ? data[0]||null : null, error: null };
          }
        }),
        order: async (orderCol) => {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${val}&order=${orderCol}`, { headers: sb._authHeaders() });
          const data = await res.json();
          return { data: Array.isArray(data) ? data : [], error: null };
        },
        single: async () => {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${val}&limit=1`, { headers: sb._authHeaders() });
          const data = await res.json();
          return { data: Array.isArray(data) ? data[0]||null : null, error: null };
        }
      })
    }),
    upsert: async (rows, opts={}) => {
      const arr = Array.isArray(rows) ? rows : [rows];
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: { ...sb._authHeaders(), 'Prefer': 'resolution=merge-duplicates,return=minimal', 'Content-Type': 'application/json' },
        body: JSON.stringify(arr)
      });
      if(!res.ok) {
        const err = await res.text();
        console.error('Upsert error:', table, err);
      }
      return { error: res.ok ? null : { message: 'Upsert failed' } };
    },
    delete: () => ({
      eq: (col, val) => ({
        eq: async (col2, val2) => {
          await fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${val}&${col2}=eq.${val2}`, { method: 'DELETE', headers: sb._authHeaders() });
          return { error: null };
        }
      })
    })
  })
};

const today = () => new Date().toISOString().split('T')[0];
const fmt = d => new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});

};
const PEPTIDES_LIST = ['Retatrutide','Tesamorelin','BPC-157','TB-500','Ipamorelin','CJC-1295','HGH Frag 176-191','Sermorelin','Semaglutide','AOD-9604','Selank','PT-141','Tirzepatide'];
const splitIcon = s => ({Push:'💪',Pull:'🔙',Legs:'🦵',Core:'🎯',Cardio:'🏃','Full Body':'⚡',Upper:'🔝',Lower:'⬇️'}[s]||'🏋');

function useAI(){
  const [loading,setLoading] = useState(false);
  const [result,setResult] = useState(null);
  const ask = async prompt => {
    setLoading(true); setResult(null);
    try {
      const res = await fetch('/api/ai', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt})
      });
      const d = await res.json();
      setResult(d.result || d.error || 'No response.');
    } catch(e) {
      setResult('AI unavailable. Check your connection.');
    }
    setLoading(false);
  };
  return {ask,loading,result,setResult};
}

// Simple bar chart without Recharts
function SimpleChart({data, color='#3d8bff', label='', height=160}) {
  if(!data||data.length<2) return null;
  const vals = data.map(d=>d.value);
  const min = Math.min(...vals)*0.995, max = Math.max(...vals)*1.005;
  const range = max-min||1;
  const w=100/data.length;
  return (
    <div style={{width:'100%',height,position:'relative',marginTop:8}}>
      <svg width="100%" height={height} viewBox={`0 0 ${data.length*20} ${height}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id={`g${label}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.4"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {data.map((d,i)=>{
          const x=i*20+10, y=height-((d.value-min)/range)*(height-20)-10;
          const nx=(i+1)*20+10, ny=i<data.length-1?height-((data[i+1].value-min)/range)*(height-20)-10:y;
          return i<data.length-1?<line key={i} x1={x} y1={y} x2={nx} y2={ny} stroke={color} strokeWidth="2"/>:null;
        })}
        <polyline fill={`url(#g${label})`} stroke="none"
          points={`${10},${height} ${data.map((d,i)=>`${i*20+10},${height-((d.value-min)/range)*(height-20)-10}`).join(' ')} ${(data.length-1)*20+10},${height}`}/>
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#2a3d58',marginTop:2,paddingLeft:4,paddingRight:4}}>
        {data.filter((_,i)=>i===0||i===Math.floor(data.length/2)||i===data.length-1).map((d,i)=>(
          <span key={i}>{d.label}</span>
        ))}
      </div>
    </div>
  );
}

function AuthScreen() {
  const [mode,setMode] = useState('login');
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [confirm,setConfirm] = useState('');
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState('');
  const [success,setSuccess] = useState('');

  const login = async () => {
    setError(''); setLoading(true);
    const {error} = await sb.auth.signInWithPassword({email,password});
    if(error) setError(error.message);
    setLoading(false);
  };
  const signup = async () => {
    setError('');
    if(password!==confirm){setError('Passwords do not match.');return;}
    if(password.length<6){setError('Password must be at least 6 characters.');return;}
    setLoading(true);
    const {error,data} = await sb.auth.signUp({email,password});
    if(error) setError(error.message);
    else if(data) setSuccess('Account created! You can now log in.');
    setLoading(false);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-grid"/>
      <div className="auth-box">
        <div className="auth-logo">LEVELUP</div>
        <div className="auth-sub">Performance Tracker</div>
        <div className="auth-toggle">
          <button className={`auth-toggle-btn${mode==='login'?' active':''}`} onClick={()=>{setMode('login');setError('');setSuccess('');}}>Login</button>
          <button className={`auth-toggle-btn${mode==='signup'?' active':''}`} onClick={()=>{setMode('signup');setError('');setSuccess('');}}>Sign Up</button>
        </div>
        {error && <div className="auth-error">{error}</div>}
        {success && <div className="auth-success">{success}</div>}
        <label className="auth-label">Email</label>
        <input className="auth-input" type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        <label className="auth-label">Password</label>
        <input className="auth-input" type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)}/>
        {mode==='signup' && <>
          <label className="auth-label">Confirm Password</label>
          <input className="auth-input" type="password" placeholder="••••••••" value={confirm} onChange={e=>setConfirm(e.target.value)}/>
        </>}
        <button className="auth-btn" onClick={mode==='login'?login:signup} disabled={loading}>
          {loading?'Please wait...':(mode==='login'?'Log In':'Create Account')}
        </button>
      </div>
    </div>
  );
}

function WeightTab({weights,setWeights,deleteWeight,notes}) {
  const [date,setDate] = useState(today());
  const [weight,setWeight] = useState('');
  const ai = useAI();
  const add = async () => {
    if(!weight||isNaN(weight)) return;
    const entry = {date,weight:parseFloat(weight),id:`${date}-${Date.now()}`};
    const updated = [...weights.filter(w=>w.date!==date),entry].sort((a,b)=>a.date.localeCompare(b.date));
    await setWeights(updated); setWeight('');
  };
  const latest = weights[weights.length-1];
  const prev = weights[weights.length-2];
  const diff = latest&&prev?+(latest.weight-prev.weight).toFixed(1):null;
  const totalChange = weights.length>1?+(weights[weights.length-1].weight-weights[0].weight).toFixed(1):null;
  const chartData = weights.slice(-30).map(w=>({label:fmt(w.date),value:w.weight}));
  const analyze = () => {
    if(weights.length<3){ai.setResult('Log at least 3 weigh-ins for trend analysis.');return;}
    const recent = weights.slice(-14);
    const trend = +(recent[recent.length-1].weight-recent[0].weight).toFixed(1);
    const noteCtx = notes.slice(-5).map(n=>`${n.date}: "${n.text}"`).join('; ');
    ai.ask(`Body recomposition coach. Weight: ${recent.map(w=>`${w.date}:${w.weight}lbs`).join(',')}. 14d change: ${trend}lbs. Notes: ${noteCtx||'none'}. 3-4 sentences: assess trend, flag issues, recommend one adjustment. Account for creatine/peptide water weight.`);
  };
  return (
    <>
      <div className="card">
        <div className="card-title">⚖ LOG WEIGHT</div>
        <div className="row">
          <div className="flex-1"><label className="section-label">Date</label><input type="date" className="input" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">Weight (lbs)</label><input type="number" className="input" placeholder="185.0" step="0.1" value={weight} onChange={e=>setWeight(e.target.value)}/></div>
        </div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={add}>LOG ENTRY</button></div>
      </div>
      {weights.length>0 && <>
        <div className="stat-grid">
          <div className="stat-box"><div className="stat-val">{latest?.weight}</div><div className="stat-lbl">Current</div></div>
          <div className="stat-box"><div className="stat-val" style={{color:diff>0?'#ff3d6b':diff<0?'#00e5a0':'#4a6080'}}>{diff!==null?(diff>0?`+${diff}`:diff):'—'}</div><div className="stat-lbl">Last Δ</div></div>
          <div className="stat-box"><div className="stat-val" style={{color:totalChange<0?'#00e5a0':totalChange>0?'#ff3d6b':'#4a6080'}}>{totalChange!==null?(totalChange>0?`+${totalChange}`:totalChange):'—'}</div><div className="stat-lbl">Total Δ</div></div>
        </div>
        <div className="card">
          <div className="card-title">📈 WEIGHT CHART</div>
          <SimpleChart data={chartData} color="#3d8bff" label="w"/>
        </div>
        <div className="card">
          <div className="card-title">◈ AI TREND ANALYSIS</div>
          <button className="btn btn-teal btn-small" onClick={analyze} style={{marginBottom:10}}>Analyze Trend</button>
          {ai.loading && <div className="ai-card"><div className="ai-label">Analyzing...</div></div>}
          {ai.result && <div className="ai-card"><div className="ai-label">AI Coach</div><div className="ai-text">{ai.result}</div></div>}
        </div>
        <div className="card">
          <div className="card-title">📋 HISTORY</div>
          {[...weights].reverse().slice(0,20).map((w,i,arr)=>{
            const nxt=arr[i+1]; const d=nxt?+(w.weight-nxt.weight).toFixed(1):null;
            return(<div key={w.date} className="log-item">
              <div><div className="log-date">{fmt(w.date)}</div><div><span className="log-val">{w.weight}</span><span className="log-unit">lbs</span></div></div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                {d!==null && <span className={`change-pill ${d>0?'cpup':d<0?'cpdown':'cpflat'}`}>{d>0?`+${d}`:d}</span>}
                <button className="btn btn-danger btn-small" onClick={()=>deleteWeight(w.date)}>✕</button>
              </div>
            </div>);
          })}
        </div>
      </>}
      {weights.length===0 && <div className="empty"><div className="empty-icon">⚖</div><div className="empty-txt">No weight logged yet.</div></div>}
    </>
  );
}

function WorkoutTab({logs,setLogs,deleteLog,plans,setPlans,goals,supplements}) {
  const [screen,setScreen] = useState('select');
  const [sel,setSel] = useState(null);
  const [selDay,setSelDay] = useState('Day A');
  const [exercises,setExercises] = useState([]);
  const [openIdx,setOpenIdx] = useState(null);
  const [logDate,setLogDate] = useState(today());
  const [customEx,setCustomEx] = useState('');
  const [newDay,setNewDay] = useState('');
  const ai = useAI();
  const getPlanExs = () => plans[sel]?.[selDay]||[];
  const togglePlanEx = ex => {
    const cur=getPlanExs();
    setPlans({...plans,[sel]:{...(plans[sel]||{}),[selDay]:cur.includes(ex)?cur.filter(e=>e!==ex):[...cur,ex]}});
  };
  const openSplit = s => {
    if(!plans[s]) setPlans({...plans,[s]:{'Day A':[]}});
    setSel(s); setSelDay('Day A'); setScreen('plan');
  };
  const startLog = () => { setExercises(getPlanExs().map(name=>({name,sets:[{reps:'',weight:'',rpe:''}]}))); setOpenIdx(null); setScreen('log'); };
  const addSet = ei => { const u=[...exercises]; u[ei].sets.push({reps:'',weight:'',rpe:''}); setExercises(u); };
  const updSet = (ei,si,f,v) => { const u=[...exercises]; u[ei].sets[si][f]=v; setExercises(u); };
  const getPrev = name => logs.filter(l=>l.split===sel).flatMap(l=>(l.exercises||[]).filter(e=>e.name===name)).slice(-3);
  const getAI = ex => {
    const h=getPrev(ex.name);
    const suppCtx=(supplements||[]).filter(s=>!s.endDate||s.endDate>=today()).map(s=>s.name).join(', ')||'none';
    const goalCtx=goals?.liftGoals?.find(g=>g.exercise===ex.name);
    const goalStr=goalCtx?`Strength goal: ${goalCtx.currentMax}→${goalCtx.targetMax}${goalCtx.unit}`:'No specific goal set';
    if(!h.length){
      ai.ask(`Evidence-based strength coach (Nippard/Helms approach). Exercise: ${ex.name}. Active supplements: ${suppCtx}. ${goalStr}. 3 sentences: recommended starting weight and rep scheme, how supplements affect performance on this lift, weekly progression model. Specific numbers.`);
      return;
    }
    const hist=h.map(h=>h.sets.map(s=>`${s.weight||'?'}lbs×${s.reps||'?'} effort:${s.rpe||'?'}`).join(',')).join(' → ');
    ai.ask(`Evidence-based strength coach. Exercise: "${ex.name}". History: ${hist}. Active supplements: ${suppCtx}. ${goalStr}. 4 sentences: 1) increase weight this session? exact amount? 2) any strength decrease detected and why (fatigue, deficit, etc.)? 3) optimal sets/reps for goal? 4) supplement impact on this lift (creatine, caffeine etc)? Specific numbers only.`);
  };
  const saveLog = async () => {
    if(!exercises.length) return;
    await setLogs([...logs,{date:logDate,split:sel,day:selDay,exercises,id:Date.now()}]);
    setExercises([]); setScreen('select');
  };
  if(screen==='select') return (
    <>
      <div className="card">
        <div className="card-title">🏋 SELECT SPLIT</div>
        <div className="split-grid">
          {SPLITS.map(s=>(
            <div key={s} className="split-card" onClick={()=>openSplit(s)}>
              <div className="split-icon">{splitIcon(s)}</div>
              <div className="split-name">{s}</div>
              <div className="split-count">{Object.keys(plans[s]||{}).length} variant(s) · {logs.filter(l=>l.split===s).length} sessions</div>
            </div>
          ))}
        </div>
      </div>
      {logs.length>0 && <div className="card">
        <div className="card-title">📅 RECENT SESSIONS</div>
        {[...logs].reverse().slice(0,6).map(log=>(
          <div key={log.id} className="log-item" style={{flexDirection:'column',alignItems:'flex-start'}}>
            <div style={{display:'flex',width:'100%',justifyContent:'space-between',alignItems:'center'}}>
              <div><div className="log-date">{fmt(log.date)}</div><div style={{fontWeight:700,fontSize:15}}>{log.split} — {log.day}</div><div style={{fontSize:12,color:'#4a6080',marginTop:2}}>{(log.exercises||[]).length} exercises</div></div>
              <button className="btn btn-danger btn-small" onClick={()=>deleteLog(log.id)}>✕</button>
            </div>
          </div>
        ))}
      </div>}
    </>
  );
  if(screen==='plan') return (
    <>
      <button className="back-btn" onClick={()=>setScreen('select')}>← Back</button>
      <div className="card">
        <div className="card-title">📋 {sel?.toUpperCase()} — PLAN</div>
        <div className="day-tabs">
          {Object.keys(plans[sel]||{}).map(d=><div key={d} className={`day-tab${selDay===d?' active':''}`} onClick={()=>setSelDay(d)}>{d}</div>)}
        </div>
        <div className="row" style={{marginBottom:12}}>
          <input className="input flex-1" placeholder="New variant (e.g. Day B)" value={newDay} onChange={e=>setNewDay(e.target.value)} style={{fontSize:13}}/>
          <button className="btn btn-secondary btn-small" onClick={()=>{if(!newDay.trim())return;setPlans({...plans,[sel]:{...(plans[sel]||{}),[newDay.trim()]:[]}}); setSelDay(newDay.trim()); setNewDay('');}}>+ Add</button>
        </div>
        <label className="section-label">Exercises for {selDay}</label>
        <div style={{display:'flex',flexWrap:'wrap',marginBottom:10}}>
          {(EXERCISES[sel]||EXERCISES.Push).map(ex=><span key={ex} className={`chip${getPlanExs().includes(ex)?' sel':''}`} onClick={()=>togglePlanEx(ex)}>{ex}</span>)}
        </div>
        {getPlanExs().length>0 && <div style={{marginBottom:10}}>
          <label className="section-label">Selected ({getPlanExs().length})</label>
          {getPlanExs().map(ex=>(
            <div key={ex} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #0f1e35'}}>
              <span style={{fontSize:13,fontWeight:600}}>{ex}</span>
              <button className="btn btn-danger btn-small" onClick={()=>togglePlanEx(ex)}>✕</button>
            </div>
          ))}
        </div>}
        <button className="btn btn-primary" onClick={startLog} disabled={!getPlanExs().length} style={{marginTop:12}}>START {selDay} →</button>
      </div>
    </>
  );
  return (
    <>
      <button className="back-btn" onClick={()=>setScreen('plan')}>← Back to Plan</button>
      <div className="card">
        <div className="card-title">⚡ {sel?.toUpperCase()} — {selDay}</div>
        <label className="section-label">Session Date</label>
        <input type="date" className="input" value={logDate} onChange={e=>setLogDate(e.target.value)}/>
        <div className="row" style={{marginTop:10}}>
          <input className="input flex-1" placeholder="Add extra exercise..." value={customEx} onChange={e=>setCustomEx(e.target.value)} style={{fontSize:13}}/>
          <button className="btn btn-secondary btn-small" onClick={()=>{if(customEx){setExercises([...exercises,{name:customEx,sets:[{reps:'',weight:'',rpe:''}]}]);setCustomEx('');setOpenIdx(exercises.length);}}}>+ Add</button>
        </div>
      </div>
      {exercises.map((ex,ei)=>{
        const prev=getPrev(ex.name);
        return (<div key={ex.name+ei} className="exercise-row">
          <div className={`exercise-hdr${openIdx===ei?' open':''}`} onClick={()=>setOpenIdx(openIdx===ei?null:ei)}>
            <div><div className="ex-name">{ex.name}</div><div className="ex-meta">{ex.sets.length} sets · {prev.length>0?`${prev.length} prev sessions`:'No history'}</div></div>
            <span style={{color:'#2a3d58',fontSize:14}}>{openIdx===ei?'▲':'▼'}</span>
          </div>
          {openIdx===ei && <div className="exercise-body">
            {prev.length>0 && <div className="prev-box">
              <div className="prev-lbl">Previous Sessions</div>
              {prev.slice(-2).reverse().map((p,pi)=><div key={pi} className="prev-row">Session -{pi+1}: {p.sets.map((s,si)=>`S${si+1} ${s.weight||'?'}×${s.reps||'?'}`).join(' | ')}</div>)}
            </div>}
            <div style={{display:'grid',gridTemplateColumns:'24px 1fr 1fr 1fr auto',gap:5,marginBottom:4}}>
              <div/>{['Reps','Weight','Effort'].map(l=><div key={l} style={{fontSize:9,color:'#2a3d58',textAlign:'center',textTransform:'uppercase',letterSpacing:1,fontWeight:700}}>{l}</div>)}<div/>
            </div>
            {ex.sets.map((s,si)=>(
              <div key={si} className="set-grid">
                <div className="set-num">{si+1}</div>
                <input className="set-inp" type="number" placeholder="10" value={s.reps} onChange={e=>updSet(ei,si,'reps',e.target.value)}/>
                <input className="set-inp" type="number" placeholder="135" value={s.weight} onChange={e=>updSet(ei,si,'weight',e.target.value)}/>
                <input className="set-inp" type="number" placeholder="7" step="0.5" title="Effort 1-10: how hard the set felt. 10=max effort, 7=3 reps left in tank. Optional." value={s.rpe} onChange={e=>updSet(ei,si,'rpe',e.target.value)}/>
                <button style={{background:'none',border:'none',color:'#ff3d6b',cursor:'pointer',fontSize:14}} onClick={()=>{const u=[...exercises];if(u[ei].sets.length>1)u[ei].sets.splice(si,1);setExercises(u);}}>✕</button>
              </div>
            ))}
            <div className="row" style={{marginTop:8,flexWrap:'wrap',gap:6}}>
              <button className="btn btn-secondary btn-small" onClick={()=>addSet(ei)}>+ Set</button>
              <button className="btn btn-teal btn-small" onClick={()=>getAI(ex)}>◈ AI Advice</button>
              <button className="btn btn-danger btn-small" onClick={()=>{const u=[...exercises];u.splice(ei,1);setExercises(u);setOpenIdx(null);}}>Remove</button>
            </div>
            {ai.loading && openIdx===ei && <div className="ai-card" style={{marginTop:8}}><div className="ai-label">Analyzing...</div></div>}
            {ai.result && openIdx===ei && <div className="ai-card" style={{marginTop:8}}><div className="ai-label">Progression Advice</div><div className="ai-text">{ai.result}</div></div>}
          </div>}
        </div>);
      })}
      {exercises.length>0 && <button className="btn btn-primary" style={{marginTop:12}} onClick={saveLog}>💾 SAVE SESSION</button>}
    </>
  );
}

function NutritionTab({nutrition,setNutrition,deleteNutrition,weights,scans,notes,goals,supplements}) {
  const [date,setDate] = useState(today());
  const [form,setForm] = useState({calories:'',protein:'',carbs:'',fats:'',water:''});
  const ai = useAI();
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const save = async () => {
    if(!form.calories) return;
    await setNutrition([...nutrition.filter(n=>n.date!==date),{date,...form,id:`${date}-${Date.now()}`}].sort((a,b)=>a.date.localeCompare(b.date)));
    setForm({calories:'',protein:'',carbs:'',fats:'',water:''});
  };
  const latest = nutrition[nutrition.length-1];
  const latestScan = scans[scans.length-1];
  const latestWeight = weights[weights.length-1];
  const chartData = nutrition.slice(-30).map(n=>({label:fmt(n.date),value:parseFloat(n.calories)||0}));

  // Evidence-based targets (Nippard/Ethier/Norton protocols)
  const lmm = parseFloat(latestScan?.lmm) || parseFloat(latestWeight?.weight)*0.8 || 0;
  const bw = parseFloat(latestWeight?.weight) || 0;
  const primaryGoal = goals?.primary || 'recomp';
  const proteinTarget = lmm ? Math.round(lmm * 1.0) : bw ? Math.round(bw * 0.73) : null; // 1g/lb LMM or 0.73g/lb BW
  const calTarget = bw ? (primaryGoal==='cut' ? Math.round(bw*14) : primaryGoal==='bulk' ? Math.round(bw*17) : Math.round(bw*15.5)) : null;
  const carbTarget = calTarget && proteinTarget ? Math.round((calTarget - proteinTarget*4 - (bw ? Math.round(bw*0.35)*9 : 0)) / 4) : null;
  const fatTarget = bw ? Math.round(bw*0.35) : null;

  const getAdvice = () => {
    const recent=nutrition.slice(-14);
    const avgCal=recent.length?Math.round(recent.reduce((a,n)=>a+(parseFloat(n.calories)||0),0)/recent.length):0;
    const avgProt=recent.length?Math.round(recent.reduce((a,n)=>a+(parseFloat(n.protein)||0),0)/recent.length):0;
    const wt=weights.slice(-14); const wChange=wt.length>1?+(wt[wt.length-1].weight-wt[0].weight).toFixed(1):0;
    const suppCtx=(supplements||[]).filter(s=>!s.endDate||s.endDate>=today()).map(s=>s.name).join(', ')||'none';
    const goalCtx=goals?`Goal: ${goals.primary||'recomp'}, target BF: ${goals.targetBF||'?'}%, target LMM: ${goals.targetLMM||'?'}lbs`:'No goal set';
    ai.ask(`You are a nutrition coach applying Jeff Nippard and Jeremy Ethier evidence-based protocols. Data:
- Body weight: ${bw}lbs, Lean mass: ${lmm}lbs, BF%: ${latestScan?.bf||'unknown'}%
- Avg calories (14d): ${avgCal} kcal, Avg protein: ${avgProt}g
- 14-day weight change: ${wChange}lbs
- Active supplements: ${suppCtx}
- ${goalCtx}
- Recent notes: ${notes.slice(-3).map(n=>n.text).join('; ')||'none'}

Apply these evidence-based principles:
- Protein: 0.7-1g per lb of LEAN MASS (not total bodyweight) per Nippard/Norton
- Calories: adjust based on weight trend — if losing >1.5lb/week risk muscle loss, if gaining >0.5lb/week too fast for lean bulk
- Creatine adds ~2-5lbs water weight (flag if in supplements)
- Carbs: prioritize around training, ~45-55% of calories
- Fats: minimum 0.3g/lb bodyweight for hormones

Give 5 numbered, specific recommendations with exact gram/calorie targets. Flag any supplement interactions with body weight data.`);
  };

  return (
    <>
      {/* Evidence-based targets card */}
      {bw > 0 && <div className="card">
        <div className="card-title">🎯 YOUR EVIDENCE-BASED TARGETS</div>
        <div style={{fontSize:11,color:'#4a6080',marginBottom:10}}>Based on Nippard/Ethier/Norton protocols · {primaryGoal==='cut'?'Cutting':primaryGoal==='bulk'?'Bulking':'Recomp'} phase</div>
        {[
          {label:'Protein',val:`${proteinTarget}g`,sub:'~1g per lb lean mass',color:'#00e5a0',pct:latest?Math.min((parseFloat(latest.protein)/proteinTarget)*100,100):0},
          {label:'Calories',val:`${calTarget} kcal`,sub:primaryGoal==='cut'?'~14 kcal/lb BW':primaryGoal==='bulk'?'~17 kcal/lb BW':'~15.5 kcal/lb BW',color:'#3d8bff',pct:latest?Math.min((parseFloat(latest.calories)/calTarget)*100,100):0},
          {label:'Fats',val:`${fatTarget}g`,sub:'0.35g/lb BW min',color:'#ff3d6b',pct:latest?Math.min((parseFloat(latest.fats)/fatTarget)*100,100):0},
          {label:'Water',val:'100+ oz',sub:'~1oz per lb BW',color:'#4a9eff',pct:latest?Math.min((parseFloat(latest.water)/100)*100,100):0},
        ].map(m=>(
          <div key={m.label} style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
              <div>
                <span style={{fontSize:12,fontWeight:700,color:m.color}}>{m.label}</span>
                <span style={{fontSize:10,color:'#4a6080',marginLeft:6}}>{m.sub}</span>
              </div>

function BodyTab({scans,setScans,deleteScan}) {
  const [form,setForm] = useState({date:today(),weight:'',bf:'',lmm:'',height:'',goal_bf:''});
  const ai = useAI();
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const add = async () => {
    if(!form.bf||!form.weight) return;
    await setScans([...scans,{...form,id:Date.now()}].sort((a,b)=>a.date.localeCompare(b.date)));
    setForm(f=>({...f,weight:'',bf:'',lmm:''}));
  };
  const latest=scans[scans.length-1]; const prev=scans[scans.length-2];
  const goalBF=parseFloat(latest?.goal_bf)||10; const currentBF=latest?parseFloat(latest.bf):null;
  const chartData=scans.map(s=>({label:fmt(s.date),value:parseFloat(s.bf)}));
  const analyze = () => {
    if(!latest) return;
    ai.ask(`Body comp coach. Scans: ${scans.slice(-4).map(s=>`${s.date}: ${s.weight}lbs, ${s.bf}% BF, LMM: ${s.lmm}lbs`).join(' | ')}. Goal: ${goalBF}% BF. 4 sentences: trajectory, weeks to goal, muscle loss concern, one adjustment.`);
  };
  const radius=38, circ=2*Math.PI*radius;
  const bfDash=currentBF?circ*(1-Math.min(currentBF/35,1)):circ;
  return (
    <>
      <div className="card">
        <div className="card-title">📊 LOG BODY SCAN</div>
        <div className="row">
          <div className="flex-1"><label className="section-label">Date</label><input type="date" className="input" value={form.date} onChange={e=>upd('date',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">Height (in)</label><input type="number" className="input" placeholder="70" value={form.height} onChange={e=>upd('height',e.target.value)}/></div>
        </div>
        <div className="row" style={{marginTop:8}}>
          <div className="flex-1"><label className="section-label">Weight (lbs)</label><input type="number" className="input" placeholder="185" step="0.1" value={form.weight} onChange={e=>upd('weight',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">Body Fat %</label><input type="number" className="input" placeholder="18" step="0.1" value={form.bf} onChange={e=>upd('bf',e.target.value)}/></div>
        </div>
        <div className="row" style={{marginTop:8}}>
          <div className="flex-1"><label className="section-label">Lean Mass (lbs)</label><input type="number" className="input" placeholder="148" step="0.1" value={form.lmm} onChange={e=>upd('lmm',e.target.value)}/></div>
          <div className="flex-1"><label className="section-label">BF% Goal</label><input type="number" className="input" placeholder="10" step="0.5" value={form.goal_bf} onChange={e=>upd('goal_bf',e.target.value)}/></div>
        </div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={add}>LOG SCAN</button></div>
      </div>
      {latest && <>
        <div className="card" style={{textAlign:'center'}}>
          <div className="card-title" style={{justifyContent:'center'}}>🎯 GOAL PROGRESS</div>
          <div style={{display:'flex',justifyContent:'center',marginBottom:10}}>
            <div style={{position:'relative',width:90,height:90}}>
              <svg width="90" height="90" viewBox="0 0 90 90">
                <circle cx="45" cy="45" r={radius} fill="none" stroke="#0d1424" strokeWidth="7"/>
                <circle cx="45" cy="45" r={radius} fill="none" stroke="url(#bg2)" strokeWidth="7" strokeDasharray={circ} strokeDashoffset={bfDash} strokeLinecap="round" style={{transform:'rotate(-90deg)',transformOrigin:'45px 45px'}}/>
                <defs><linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#1e6bff"/><stop offset="100%" stopColor="#00c2ff"/></linearGradient></defs>
              </svg>
              <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}}>
                <div style={{fontFamily:'Orbitron,sans-serif',fontSize:20,fontWeight:700,color:'#3d8bff',lineHeight:1}}>{currentBF}%</div>
                <div style={{fontSize:9,color:'#4a6080',textTransform:'uppercase',letterSpacing:1}}>Body Fat</div>
              </div>
            </div>
          </div>
          <div style={{fontSize:12,color:'#4a6080'}}>Goal: {goalBF}% · {currentBF>goalBF?`${+(currentBF-goalBF).toFixed(1)}% remaining`:'🎉 Goal hit!'}</div>
          <div style={{background:'#0d1424',borderRadius:4,height:8,overflow:'hidden',marginTop:10}}>
            <div style={{height:'100%',borderRadius:4,background:'linear-gradient(90deg,#1e6bff,#00c2ff)',width:`${Math.min(Math.max(0,((25-currentBF)/(25-goalBF))*100),100)}%`}}/>
          </div>
        </div>
        <div className="stat-grid">
          <div className="stat-box"><div className="stat-val">{latest.weight}</div><div className="stat-lbl">lbs total</div></div>
          <div className="stat-box"><div className="stat-val" style={{color:'#00c2ff'}}>{latest.lmm||'—'}</div><div className="stat-lbl">lbs lean</div></div>
          <div className="stat-box"><div className="stat-val" style={{color:prev&&latest.lmm&&parseFloat(latest.lmm)>=parseFloat(prev.lmm)?'#00e5a0':'#ff3d6b'}}>{prev&&latest.lmm?`${+(parseFloat(latest.lmm)-parseFloat(prev.lmm)).toFixed(1)>0?'+':''}${+(parseFloat(latest.lmm)-parseFloat(prev.lmm)).toFixed(1)}`:'—'}</div><div className="stat-lbl">LMM Δ</div></div>
        </div>
      </>}
      {scans.length>1 && <div className="card"><div className="card-title">📉 BF% TREND</div><SimpleChart data={chartData} color="#ff3d6b" label="bf"/></div>}
      {latest && <div className="card">

        {ai.loading && <div className="ai-card"><div className="ai-label">Analyzing...</div></div>}
        {ai.result && <div className="ai-card"><div className="ai-label">Body Comp Coach</div><div className="ai-text">{ai.result}</div></div>}
      </div>}
      {scans.length>0 && <div className="card">
        <div className="card-title">📋 SCAN HISTORY</div>
        {[...scans].reverse().map(s=>(
          <div key={s.id} style={{background:'#0d1424',border:'1px solid #111d33',borderRadius:8,padding:12,marginBottom:8}}>
            <div className="log-date">{fmt(s.date)}</div>
            <div style={{display:'flex',gap:14,marginTop:4,flexWrap:'wrap'}}>
              <div><span style={{fontSize:11,color:'#4a6080'}}>Weight </span><strong>{s.weight} lbs</strong></div>
              <div><span style={{fontSize:11,color:'#4a6080'}}>BF </span><strong style={{color:'#ff3d6b'}}>{s.bf}%</strong></div>
              <div><span style={{fontSize:11,color:'#4a6080'}}>LMM </span><strong style={{color:'#00c2ff'}}>{s.lmm} lbs</strong></div>
            </div>
            <button className="btn btn-danger btn-small" style={{marginTop:8}} onClick={()=>deleteScan(s.id)}>Remove</button>
          </div>
        ))}
      </div>}
      {scans.length===0 && <div className="empty"><div className="empty-icon">📊</div><div className="empty-txt">No body scans logged yet.</div></div>}
    </>
  );
}

            <EntryCard key={s.id} item={s} color="#00e5a0"
              onEnd={()=>setSupplements(supplements.map(x=>x.id===s.id?{...x,endDate:today()}:x))}
              onDelete={()=>deleteSupplement(s.id)}
              onResearch={()=>getInfo(s)}/>
          ))}
          {ai.loading && <div className="ai-card"><div className="ai-label">Researching...</div></div>}
          {ai.result && <div className="ai-card"><div className="ai-label">Research Brief</div><div className="ai-text">{ai.result}</div></div>}
        </div>}
        {supplements.filter(s=>!isActive(s)).length>0 && <div className="card">
          <div className="card-title" style={{color:'#2a3d58'}}>⬛ PAST SUPPLEMENTS</div>
          {supplements.filter(s=>!isActive(s)).map(s=>(
            <div key={s.id} style={{background:'#0d1424',border:'1px solid #111d33',borderRadius:10,padding:14,marginBottom:8,opacity:0.55}}>
              <div style={{fontWeight:700,color:'#4a6080'}}>{s.name}</div>
              <div style={{fontSize:12,color:'#2a3d58'}}>{s.dose}{s.unit} · {s.freq} · {fmt(s.startDate)} → {fmt(s.endDate)} · {daysOn(s)} days</div>
              <button className="btn btn-danger btn-small" style={{marginTop:8}} onClick={()=>deleteSupplement(s.id)}>Remove</button>
            </div>
          ))}
        </div>}
        {supplements.length===0 && <div className="empty"><div className="empty-icon">💊</div><div className="empty-txt">No supplements logged yet.</div></div>}
      </>}
    </>
  );
}

function NotesTab({notes,setNotes,deleteNote}) {
  const [date,setDate] = useState(today());
  const [text,setText] = useState('');
  const [tag,setTag] = useState('General');
  const TAGS = ['General','Supplement','Peptide','Training','Diet','Health','PR'];
  const tagColor = t => ({Supplement:'tag-teal',Peptide:'tag-blue',PR:'tag-green',Health:'tag-red'}[t]||'tag-blue');
  const add = async () => {
    if(!text.trim()) return;
    await setNotes([...notes,{date,text:text.trim(),tag,id:Date.now()}]);
    setText('');
  };
  return (
    <>
      <div className="card">
        <div className="card-title">📝 ADD NOTE</div>
        <div style={{fontSize:12,color:'#4a6080',marginBottom:12}}>Log events like starting creatine, peptide changes, illness, PRs — AI uses these to explain data shifts.</div>

        </div>
        <div style={{marginTop:10}}><label className="section-label">Note</label><textarea className="input" placeholder="e.g. Started creatine 5g/day — expect 3-5lb water weight gain..." value={text} onChange={e=>setText(e.target.value)}/></div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={add}>SAVE NOTE</button></div>
      </div>
      {notes.length>0 && <div className="card">
        <div className="card-title">📋 ALL NOTES</div>
        {[...notes].reverse().map(n=>(
          <div key={n.id} style={{background:'#0d1424',borderLeft:'3px solid #1e6bff',borderRadius:'0 8px 8px 0',borderTop:'1px solid #111d33',borderRight:'1px solid #111d33',borderBottom:'1px solid #111d33',padding:'10px 12px',marginBottom:8}}>

                <div style={{fontSize:13,color:'#e8f0ff',lineHeight:1.5,marginTop:4}}>{n.text}</div>

// ── GOALS TAB ─────────────────────────────────────────────────────────────────
function GoalsTab({goals,setGoals,logs,scans,weights,supplements}) {
  const [form,setForm] = useState(goals || {
    primary:'recomp', targetBF:'', targetLMM:'', targetWeight:'',
    liftGoals:[{exercise:'',currentMax:'',targetMax:'',unit:'lbs',deadline:''}],
    deadline:'', notes:''
  });
  const ai = useAI();
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  const addLiftGoal = () => setForm(f=>({...f,liftGoals:[...f.liftGoals,{exercise:'',currentMax:'',targetMax:'',unit:'lbs',deadline:''}]}));
  const updLift = (i,k,v) => setForm(f=>({...f,liftGoals:f.liftGoals.map((l,li)=>li===i?{...l,[k]:v}:l)}));
  const removeLift = i => setForm(f=>({...f,liftGoals:f.liftGoals.filter((_,li)=>li!==i)}));

  const save = async () => { await setGoals(form); };

  const latestScan = scans[scans.length-1];
  const latestWeight = weights[weights.length-1];
  const activeSups = (supplements||[]).filter(s=>!s.endDate||s.endDate>=today());

  const getGoalPlan = () => {
    const liftGoalCtx = form.liftGoals.filter(l=>l.exercise).map(l=>`${l.exercise}: ${l.currentMax}→${l.targetMax}${l.unit}${l.deadline?' by '+l.deadline:''}`).join(', ');
    const suppCtx = activeSups.map(s=>`${s.name} ${s.dose}${s.unit}`).join(', ')||'none';
    ai.ask(`You are an evidence-based strength and physique coach (think Jeff Nippard, Jeremy Ethier, Eric Helms approach).

Client data:
- Current: ${latestWeight?.weight||'?'}lbs, ${latestScan?.bf||'?'}% BF, ${latestScan?.lmm||'?'}lbs lean mass
- Primary goal: ${form.primary}
- Body composition targets: ${form.targetBF?`${form.targetBF}% BF`:'not set'}, ${form.targetLMM?`${form.targetLMM}lbs LMM`:'not set'}, ${form.targetWeight?`${form.targetWeight}lbs bodyweight`:'not set'}
- Strength goals: ${liftGoalCtx||'none set'}
- Active supplements: ${suppCtx}
- Deadline: ${form.deadline||'none set'}
- Notes: ${form.notes||'none'}
- Training sessions this week: ${logs.filter(l=>Math.round((new Date()-new Date(l.date+'T12:00:00'))/86400000)<=7).length}

Provide a comprehensive goal achievement plan with 6 sections:
1. TIMELINE — realistic weeks to each goal at optimal rate, flag if deadline is aggressive
2. TRAINING SPLIT — optimal PPL/upper-lower recommendation for these specific goals
3. PROGRESSION STRATEGY — for each strength goal, weekly progression model (linear vs undulating)
4. NUTRITION PHASE — cut/bulk/recomp recommendation with specific calorie and protein targets
5. SUPPLEMENT NOTES — how current supplements support or don't support these goals (creatine for strength, fish oil for recovery, etc.)
6. PRIORITY — the single most important thing to focus on this week

Be specific with numbers. Flag any conflicts between goals (e.g. aggressive fat loss AND strength increase simultaneously).`);
  };

  // Calculate lift goal progress
  const getLiftProgress = (liftGoal) => {
    if(!liftGoal.exercise||!liftGoal.currentMax||!liftGoal.targetMax) return null;
    const recentLogs = logs.flatMap(l=>(l.exercises||[]).filter(e=>e.name===liftGoal.exercise));
    if(!recentLogs.length) return null;
    const maxLogged = Math.max(...recentLogs.flatMap(e=>e.sets.map(s=>parseFloat(s.weight)||0)));
    const pct = Math.min(((maxLogged - parseFloat(liftGoal.currentMax)) / (parseFloat(liftGoal.targetMax) - parseFloat(liftGoal.currentMax))) * 100, 100);
    return { current: maxLogged, pct: Math.max(0, pct) };
  };

  return (
    <>
      <div className="card">
        <div className="card-title">🎯 SET YOUR GOALS</div>
        <label className="section-label">Primary Goal</label>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:4}}>
          {[{key:'cut',label:'Fat Loss',icon:'🔥'},{key:'bulk',label:'Muscle Gain',icon:'💪'},{key:'recomp',label:'Recomp',icon:'⚡'},{key:'strength',label:'Strength',icon:'🏋'},{key:'endurance',label:'Endurance',icon:'🏃'},{key:'maintain',label:'Maintain',icon:'⚖'}].map(g=>(
            <div key={g.key} onClick={()=>upd('primary',g.key)} style={{background:form.primary===g.key?'rgba(30,107,255,0.15)':'#0d1424',border:`1px solid ${form.primary===g.key?'#1e6bff':'#1a2a44'}`,borderRadius:8,padding:'10px 8px',textAlign:'center',cursor:'pointer'}}>
              <div style={{fontSize:20,marginBottom:4}}>{g.icon}</div>
              <div style={{fontSize:11,fontWeight:700,color:form.primary===g.key?'#3d8bff':'#4a6080',letterSpacing:0.5}}>{g.label}</div>
            </div>
          ))}
        </div>

        <label className="section-label">Body Composition Targets</label>
        <div className="row">
          <div className="flex-1"><label style={{fontSize:10,color:'#4a6080',display:'block',marginBottom:4}}>Target BF%</label><input type="number" className="input" placeholder="10" step="0.5" value={form.targetBF} onChange={e=>upd('targetBF',e.target.value)}/></div>
          <div className="flex-1"><label style={{fontSize:10,color:'#4a6080',display:'block',marginBottom:4}}>Target LMM (lbs)</label><input type="number" className="input" placeholder="160" step="0.5" value={form.targetLMM} onChange={e=>upd('targetLMM',e.target.value)}/></div>
          <div className="flex-1"><label style={{fontSize:10,color:'#4a6080',display:'block',marginBottom:4}}>Target Weight</label><input type="number" className="input" placeholder="175" step="0.5" value={form.targetWeight} onChange={e=>upd('targetWeight',e.target.value)}/></div>
        </div>

        <label className="section-label">Strength Goals</label>
        {form.liftGoals.map((l,i)=>(
          <div key={i} style={{background:'#0d1424',border:'1px solid #1a2a44',borderRadius:8,padding:10,marginBottom:8}}>
            <div className="row" style={{marginBottom:6}}>
              <input className="input flex-1" placeholder="Exercise (e.g. Bench Press)" value={l.exercise} onChange={e=>updLift(i,'exercise',e.target.value)} style={{fontSize:13}}/>
              <button className="btn btn-danger btn-small" onClick={()=>removeLift(i)}>✕</button>
            </div>
            <div className="row">
              <div className="flex-1"><label style={{fontSize:10,color:'#4a6080',display:'block',marginBottom:3}}>Current Max</label><input type="number" className="input" placeholder="185" value={l.currentMax} onChange={e=>updLift(i,'currentMax',e.target.value)}/></div>
              <div className="flex-1"><label style={{fontSize:10,color:'#4a6080',display:'block',marginBottom:3}}>Target Max</label><input type="number" className="input" placeholder="225" value={l.targetMax} onChange={e=>updLift(i,'targetMax',e.target.value)}/></div>
              <div style={{width:70}}><label style={{fontSize:10,color:'#4a6080',display:'block',marginBottom:3}}>Unit</label><select className="input" value={l.unit} onChange={e=>updLift(i,'unit',e.target.value)}><option>lbs</option><option>kg</option></select></div>
            </div>
            <div style={{marginTop:6}}><label style={{fontSize:10,color:'#4a6080',display:'block',marginBottom:3}}>Target Date (opt)</label><input type="date" className="input" value={l.deadline} onChange={e=>updLift(i,'deadline',e.target.value)}/></div>
            {getLiftProgress(l) && (()=>{const p=getLiftProgress(l);return(
              <div style={{marginTop:8}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#4a6080',marginBottom:3}}>
                  <span>Progress</span><span style={{color:'#3d8bff'}}>{p.current}lbs logged ({Math.round(p.pct)}%)</span>
                </div>
                <div style={{height:4,background:'#111d33',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',background:'linear-gradient(90deg,#1e6bff,#00c2ff)',borderRadius:2,width:`${p.pct}%`}}/></div>
              </div>
            );})()} 
          </div>
        ))}
        <button className="btn btn-secondary btn-small" onClick={addLiftGoal} style={{marginBottom:12}}>+ Add Lift Goal</button>

        <div className="row">
          <div className="flex-1"><label className="section-label">Goal Deadline</label><input type="date" className="input" value={form.deadline} onChange={e=>upd('deadline',e.target.value)}/></div>
        </div>
        <div style={{marginTop:10}}><label className="section-label">Additional Notes</label><textarea className="input" placeholder="e.g. Wedding in October, Japan trip in August..." value={form.notes} onChange={e=>upd('notes',e.target.value)}/></div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={save}>SAVE GOALS</button></div>
      </div>

      {/* Progress Overview */}
      {goals?.primary && <div className="card">
        <div className="card-title">📊 GOAL PROGRESS</div>
        {goals.targetBF && latestScan?.bf && (()=>{
          const current=parseFloat(latestScan.bf), target=parseFloat(goals.targetBF), start=25;
          const pct=Math.min(Math.max(((start-current)/(start-target))*100,0),100);
          return(<div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}><span style={{color:'#4a6080'}}>Body Fat</span><span style={{color:'#ff3d6b'}}>{current}% → {target}%</span></div>
            <div style={{height:6,background:'#111d33',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:'linear-gradient(90deg,#1e6bff,#00c2ff)',borderRadius:3,width:`${pct}%`}}/></div>
            <div style={{fontSize:10,color:'#4a6080',marginTop:2}}>{Math.round(pct)}% of the way there</div>
          </div>);
        })()}
        {goals.targetLMM && latestScan?.lmm && (()=>{
          const current=parseFloat(latestScan.lmm), target=parseFloat(goals.targetLMM);
          const start=current-(target-current)*0.5;
          const pct=Math.min(Math.max(((current-start)/(target-start))*100,0),100);
          return(<div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}><span style={{color:'#4a6080'}}>Lean Mass</span><span style={{color:'#00c2ff'}}>{current}lbs → {target}lbs</span></div>
            <div style={{height:6,background:'#111d33',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:'linear-gradient(90deg,#00c2ff,#00e5a0)',borderRadius:3,width:`${pct}%`}}/></div>
            <div style={{fontSize:10,color:'#4a6080',marginTop:2}}>{Math.round(pct)}% of the way there</div>
          </div>);
        })()}
        {goals.liftGoals?.filter(l=>l.exercise&&getLiftProgress(l)).map((l,i)=>{
          const p=getLiftProgress(l);
          return p?(<div key={i} style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}><span style={{color:'#4a6080'}}>{l.exercise}</span><span style={{color:'#3d8bff'}}>{p.current}→{l.targetMax}{l.unit}</span></div>
            <div style={{height:6,background:'#111d33',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:'linear-gradient(90deg,#1e6bff,#00c2ff)',borderRadius:3,width:`${p.pct}%`}}/></div>
            <div style={{fontSize:10,color:'#4a6080',marginTop:2}}>{Math.round(p.pct)}% of the way there</div>
          </div>):null;
        })}
      </div>}

      <div className="card">
        <div className="card-title">◈ AI GOAL ACHIEVEMENT PLAN</div>
        <div style={{fontSize:11,color:'#4a6080',marginBottom:10}}>Evidence-based roadmap for your specific goals. Accounts for supplements, training history, and body composition.</div>
        <button className="btn btn-primary" onClick={getGoalPlan}>Generate My Plan</button>
        {ai.loading && <div className="ai-card" style={{marginTop:10}}><div className="ai-label">Building your plan...</div></div>}
        {ai.result && <div className="ai-card" style={{marginTop:10}}><div className="ai-label">Your Goal Plan</div><div className="ai-text">{ai.result}</div></div>}
      </div>
    </>
  );
}

Full client profile:
- Weight trend (14d): ${wt}
- Body composition: ${scan}
- Goals: ${goalCtx}
- Full stack (peptides + supplements): ${stack}
- Avg calories (7d): ${avgCal} kcal

Important context:
${creatineActive?'- Creatine is active: expect 2-5lbs water weight, strength improvements of ~5-10% over 4 weeks':''}

        {iRow('🎯','rgba(30,107,255,0.12)','Goal Status',
          goals?.primary
            ? `${goals.primary.charAt(0).toUpperCase()+goals.primary.slice(1)} phase. ${goals.targetBF&&latestScan?.bf?`BF: ${latestScan.bf}% → ${goals.targetBF}% (${+(parseFloat(latestScan.bf)-parseFloat(goals.targetBF)).toFixed(1)}% remaining).`:'Set body scan to track progress.'}`
            : 'Set your goals in the Goals tab for personalized insights.'
        )}
        {iRow('💉','rgba(0,194,255,0.12)','Stack',
          [...activePeptides,...activeSups].length>0
            ? `Active: ${[...activePeptides,...activeSups].map(p=>p.name).join(', ')}.`
            : 'No active protocols. Log your stack.'
        )}
        {notes.length>0 && iRow('📝','rgba(30,107,255,0.12)','Latest Note',`${notes[notes.length-1]?.text?.slice(0,100)}${notes[notes.length-1]?.text?.length>100?'…':''}`)}
      </div>

      <div className="card">
        <div className="card-title">◈ FULL AI COACHING BRIEF</div>
        <div style={{fontSize:11,color:'#4a6080',marginBottom:10}}>Synthesizes all data — weight, training, nutrition, body comp, peptides, supplements, and goals. Evidence-based methodology.</div>
        <button className="btn btn-primary" onClick={fullBrief}>GENERATE COACHING BRIEF</button>
        {ai.loading && <div className="ai-card" style={{marginTop:10}}><div className="ai-label">Synthesizing all data...</div></div>}
        {ai.result && <div className="ai-card" style={{marginTop:10}}><div className="ai-label">Coaching Brief</div><div className="ai-text">{ai.result}</div></div>}
      </div>
    </>
  );
}

function App() {
  const [session,setSession] = useState(null);
  const [appLoading,setAppLoading] = useState(true);
  const [tab,setTab] = useState(0);
  const [weights,setWeightsS] = useState([]);
  const [logs,setLogsS] = useState([]);
  const [plans,setPlansS] = useState({});
  const [nutrition,setNutritionS] = useState([]);
  const [scans,setScansS] = useState([]);
  const [peptides,setPeptidesS] = useState([]);
  const [supplements,setSupplementsS] = useState([]);
  const [notes,setNotesS] = useState([]);
  const [goals,setGoalsS] = useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{ setSession(session); setAppLoading(false); });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{ if(session) loadAll(); },[session]);

  const uid = () => session?.user?.id;

  const loadAll = async () => {
    const u=uid(); if(!u) return;
    try {
      const [w,l,p,n,s,pep,nt,supp,gl] = await Promise.all([
        sb.from('weights').select('*').eq('user_id',u).order('date'),
        sb.from('workout_logs').select('*').eq('user_id',u).order('date'),
        sb.from('workout_plans').select('*').eq('user_id',u).single(),
        sb.from('nutrition').select('*').eq('user_id',u).order('date'),
        sb.from('body_scans').select('*').eq('user_id',u).order('date'),
        sb.from('peptides').select('*').eq('user_id',u).order('start_date'),
        sb.from('notes').select('*').eq('user_id',u).order('date'),
        sb.from('supplements').select('*').eq('user_id',u).order('start_date'),
        sb.from('user_goals').select('*').eq('user_id',u).single(),
      ]);
      if(w.data) setWeightsS(w.data);
      if(l.data) setLogsS(l.data.map(r=>({...r,exercises:r.exercises||[]})));
      if(p.data) setPlansS(p.data.plans||{});
      if(n.data) setNutritionS(n.data);
      if(s.data) setScansS(s.data);
      if(pep.data) setPeptidesS(pep.data);
      if(nt.data) setNotesS(nt.data);
      if(supp.data) setSupplementsS(supp.data);
      if(gl.data) setGoalsS(gl.data.goals||null);
    } catch(e) { console.error(e); }
  };

  const setWeights = async rows => { setWeightsS(rows); await sb.from('weights').upsert(rows.map(r=>({...r,user_id:uid()})),{}); };
  const deleteWeight = async date => { setWeightsS(w=>w.filter(x=>x.date!==date)); await sb.from('weights').delete().eq('user_id',uid()).eq('date',date); };
  const setLogs = async rows => { setLogsS(rows); await sb.from('workout_logs').upsert(rows.map(r=>({...r,user_id:uid(),exercises:r.exercises||[]})),{}); };
  const deleteLog = async id => { setLogsS(l=>l.filter(x=>x.id!==id)); await sb.from('workout_logs').delete().eq('id',id).eq('user_id',uid()); };
  const setPlans = async p => { setPlansS(p); await sb.from('workout_plans').upsert({user_id:uid(),plans:p},{}); };
  const setNutrition = async rows => { setNutritionS(rows); await sb.from('nutrition').upsert(rows.map(r=>({...r,user_id:uid()})),{}); };
  const deleteNutrition = async (id,date) => { setNutritionS(n=>n.filter(x=>(x.id||x.date)!==(id||date))); if(id) await sb.from('nutrition').delete().eq('id',id).eq('user_id',uid()); else await sb.from('nutrition').delete().eq('date',date).eq('user_id',uid()); };
  const setScans = async rows => { setScansS(rows); await sb.from('body_scans').upsert(rows.map(r=>({...r,user_id:uid()})),{}); };
  const deleteScan = async id => { setScansS(s=>s.filter(x=>x.id!==id)); await sb.from('body_scans').delete().eq('id',id).eq('user_id',uid()); };
  const setPeptides = async rows => { setPeptidesS(rows); await sb.from('peptides').upsert(rows.map(r=>({...r,user_id:uid()})),{}); };
  const deletePeptide = async id => { setPeptidesS(p=>p.filter(x=>x.id!==id)); await sb.from('peptides').delete().eq('id',id).eq('user_id',uid()); };
  const setSupplements = async rows => { setSupplementsS(rows); await sb.from('supplements').upsert(rows.map(r=>({...r,user_id:uid()})),{}); };
  const deleteSupplement = async id => { setSupplementsS(s=>s.filter(x=>x.id!==id)); await sb.from('supplements').delete().eq('id',id).eq('user_id',uid()); };
  const setNotes = async rows => { setNotesS(rows); await sb.from('notes').upsert(rows.map(r=>({...r,user_id:uid()})),{}); };
  const deleteNote = async id => { setNotesS(n=>n.filter(x=>x.id!==id)); await sb.from('notes').delete().eq('id',id).eq('user_id',uid()); };
  const setGoals = async g => { setGoalsS(g); await sb.from('user_goals').upsert({user_id:uid(),goals:g},{}); };

  const TABS=[{icon:'⚖',label:'Weight'},{icon:'🏋',label:'Train'},{icon:'🍽',label:'Nutrition'},{icon:'📊',label:'Body'},{icon:'💉',label:'Stack'},{icon:'🎯',label:'Goals'},{icon:'📝',label:'Notes'},{icon:'💡',label:'Insights'}];

  if(appLoading) return (
    <div style={{minHeight:'100vh',background:'#000',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{fontFamily:'Rajdhani,sans-serif',color:'#1e6bff',fontSize:14,letterSpacing:3,textTransform:'uppercase'}}>Loading...</div>
    </div>
  );

  if(!session) return <AuthScreen/>;

  return (
    <div className="app">
      <div className="header">
        <div className="header-inner">
          <div><div className="logo">LEVELUP</div><div className="logo-sub">Performance Tracker</div></div>
          <div className="header-right">
            <div className="live-dot">Live</div>
            <button className="signout-btn" onClick={()=>sb.auth.signOut()}>Sign Out</button>
          </div>
        </div>
      </div>
      <div className="content">
        {tab===0 && <WeightTab weights={weights} setWeights={setWeights} deleteWeight={deleteWeight} notes={notes}/>}
        {tab===1 && <WorkoutTab logs={logs} setLogs={setLogs} deleteLog={deleteLog} plans={plans} setPlans={setPlans} goals={goals} supplements={supplements}/>}
        {tab===2 && <NutritionTab nutrition={nutrition} setNutrition={setNutrition} deleteNutrition={deleteNutrition} weights={weights} scans={scans} notes={notes} goals={goals} supplements={supplements}/>}
        {tab===3 && <BodyTab scans={scans} setScans={setScans} deleteScan={deleteScan} goals={goals}/>}
        {tab===4 && <PeptideTab peptides={peptides} setPeptides={setPeptides} deletePeptide={deletePeptide} supplements={supplements} setSupplements={setSupplements} deleteSupplement={deleteSupplement}/>}
        {tab===5 && <GoalsTab goals={goals} setGoals={setGoals} logs={logs} scans={scans} weights={weights} supplements={supplements}/>}
        {tab===6 && <NotesTab notes={notes} setNotes={setNotes} deleteNote={deleteNote}/>}
        {tab===7 && <InsightsTab weights={weights} logs={logs} scans={scans} peptides={peptides} nutrition={nutrition} notes={notes} goals={goals} supplements={supplements}/>}
      </div>
      <div className="tabs">
        {TABS.map((t,i)=>(
          <button key={i} className={`tab${tab===i?' active':''}`} onClick={()=>setTab(i)}>
            <span className="tab-icon">{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
