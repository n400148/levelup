function useAI(){
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const ask=async prompt=>{
    setLoading(true);setResult(null);
    try{
      const res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
      if(res.ok){const d=await res.json();setResult(d.result||d.error||'No response.');}
      else{setResult('AI service error — try again.');}
    }catch(e){setResult('AI unavailable.');}
    setLoading(false);
  };
  return {ask,loading,result,setResult};
}

function SimpleChart({data,color='#3d8bff',height=150}){
  if(!data||data.length<2)return null;
  const vals=data.map(d=>d.value);
  const min=Math.min(...vals)*0.995,max=Math.max(...vals)*1.005,range=max-min||1;
  const W=data.length*20,H=height;
  const pts=data.map((d,i)=>`${i*20+10},${H-((d.value-min)/range)*(H-20)-10}`).join(' ');
  return(
    <div style={{width:'100%',height}}>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs><linearGradient id={`g${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2"/>
        <polygon points={`10,${H} ${pts} ${(data.length-1)*20+10},${H}`} fill={`url(#g${color.replace('#','')})`}/>
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#2a3d58',padding:'2px 4px 0'}}>
        {[data[0],data[Math.floor(data.length/2)],data[data.length-1]].map((d,i)=><span key={i}>{d?.label}</span>)}
      </div>
    </div>
  );
}

}

  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const reset=()=>{setErr('');setOk('');};
  const login=async()=>{reset();setLoading(true);const{error}=await sb.auth.signInWithPassword({email,password:pw});if(error)setErr(error.message);setLoading(false);};
  const signup=async()=>{reset();if(pw!==pw2){setErr('Passwords do not match.');return;}if(pw.length<6){setErr('Password must be at least 6 characters.');return;}setLoading(true);const{error}=await sb.auth.signUp({email,password:pw});if(error)setErr(error.message);else setOk('Account created! You can now log in.');setLoading(false);};
  return(
    <div className="auth-wrap">
      <div className="auth-grid"/>
      <div className="auth-box">
        <div className="auth-logo">LEVELUP</div>
        <div className="auth-sub">Performance Tracker</div>
        <div className="auth-toggle">
          <button className={`auth-btn-toggle${mode==='login'?' active':''}`} onClick={()=>{setMode('login');reset();}}>Login</button>
          <button className={`auth-btn-toggle${mode==='signup'?' active':''}`} onClick={()=>{setMode('signup');reset();}}>Sign Up</button>
        </div>
        {err&&<div className="auth-err">{err}</div>}
        {ok&&<div className="auth-ok">{ok}</div>}
        <label className="auth-lbl">Email</label>
        <input className="auth-inp" type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        <label className="auth-lbl">Password</label>
        <input className="auth-inp" type="password" placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)}/>
        {mode==='signup'&&<><label className="auth-lbl">Confirm Password</label><input className="auth-inp" type="password" placeholder="••••••••" value={pw2} onChange={e=>setPw2(e.target.value)}/></>}
        <button className="auth-submit" onClick={mode==='login'?login:signup} disabled={loading}>{loading?'Please wait...':(mode==='login'?'Log In':'Create Account')}</button>
      </div>
    </div>
  );
}

// WEIGHT TAB
function WeightTab({weights,setWeights,deleteWeight,notes}){
  const [date,setDate]=useState(today());
  const [weight,setWeight]=useState('');
  const ai=useAI();
  const add=async()=>{if(!weight||isNaN(weight))return;const e={date,weight:parseFloat(weight),id:`w-${date}-${Date.now()}`};await setWeights([...weights.filter(w=>w.date!==date),e].sort((a,b)=>a.date.localeCompare(b.date)));setWeight('');};
  const latest=weights[weights.length-1];
  const prev=weights[weights.length-2];
  const diff=latest&&prev?+(latest.weight-prev.weight).toFixed(1):null;
  const total=weights.length>1?+(weights[weights.length-1].weight-weights[0].weight).toFixed(1):null;
  const chart=weights.slice(-30).map(w=>({label:fmt(w.date),value:w.weight}));
  const analyze=()=>{
    if(weights.length<3){ai.setResult('Log at least 3 weigh-ins for trend analysis.');return;}
    const r=weights.slice(-14);const trend=+(r[r.length-1].weight-r[0].weight).toFixed(1);
    const nc=notes.slice(-5).map(n=>`${n.date}:"${n.text}"`).join(';');
    ai.ask(`Body recomposition coach. Weight data: ${r.map(w=>`${w.date}:${w.weight}lbs`).join(',')}. 14d change:${trend}lbs. Notes:${nc||'none'}. 3-4 sentences: assess trend, flag issues, recommend one adjustment. Account for creatine/peptide water weight.`);
  };
  return(
    <>
      <div className="card">
        <div className="card-title">⚖ LOG WEIGHT</div>
        <div className="row">
          <div className="f1"><label className="sl">Date</label><input type="date" className="input" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div className="f1"><label className="sl">Weight (lbs)</label><input type="number" className="input" placeholder="185.0" step="0.1" value={weight} onChange={e=>setWeight(e.target.value)}/></div>
        </div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={add}>LOG ENTRY</button></div>
      </div>
      {weights.length>0&&<>
        <div className="sg">
          <div className="sb"><div className="sv">{latest?.weight}</div><div className="slbl">Current</div></div>
          <div className="sb"><div className="sv" style={{color:diff>0?'#ff3d6b':diff<0?'#00e5a0':'#4a6080'}}>{diff!==null?(diff>0?`+${diff}`:diff):'—'}</div><div className="slbl">Last Δ</div></div>
          <div className="sb"><div className="sv" style={{color:total<0?'#00e5a0':total>0?'#ff3d6b':'#4a6080'}}>{total!==null?(total>0?`+${total}`:total):'—'}</div><div className="slbl">Total Δ</div></div>
        </div>
        <div className="card"><div className="card-title">📈 WEIGHT CHART</div><SimpleChart data={chart} color="#3d8bff"/></div>
        <div className="card">
          <div className="card-title">◈ AI TREND ANALYSIS</div>
          <button className="btn btn-teal btn-small" onClick={analyze} style={{marginBottom:10}}>Analyze Trend</button>
          <AIBox ai={ai}/>
        </div>
        <div className="card">
          <div className="card-title">📋 HISTORY</div>
          {[...weights].reverse().slice(0,20).map((w,i,arr)=>{
            const n=arr[i+1];const d=n?+(w.weight-n.weight).toFixed(1):null;
            return(<div key={w.date} className="li"><div><div className="ld">{fmt(w.date)}</div><div><span className="lv">{w.weight}</span><span className="lu">lbs</span></div></div><div style={{display:'flex',gap:8,alignItems:'center'}}>{d!==null&&<span className={`cp ${d>0?'cpup':d<0?'cpdown':'cpflat'}`}>{d>0?`+${d}`:d}</span>}<button className="btn btn-danger btn-small" onClick={()=>deleteWeight(w.date)}>✕</button></div></div>);
          })}
        </div>
      </>}
      {weights.length===0&&<div className="empty"><div className="empty-icon">⚖</div><div className="empty-txt">No weight logged yet.</div></div>}
    </>
  );
}

// WORKOUT TAB
function WorkoutTab({logs,setLogs,deleteLog,plans,setPlans,supplements}){
  const [screen,setScreen]=useState('select');
  const [sel,setSel]=useState(null);
  const [selDay,setSelDay]=useState('Day A');
  const [exercises,setExercises]=useState([]);
  const [openIdx,setOpenIdx]=useState(null);
  const [logDate,setLogDate]=useState(today());
  const [customEx,setCustomEx]=useState('');
  const [newDay,setNewDay]=useState('');
  const ai=useAI();
  const getPlan=()=>plans[sel]?.[selDay]||[];
  const toggleEx=ex=>{const c=getPlan();setPlans({...plans,[sel]:{...(plans[sel]||{}),[selDay]:c.includes(ex)?c.filter(e=>e!==ex):[...c,ex]}});};
  const openSplit=s=>{if(!plans[s])setPlans({...plans,[s]:{'Day A':[]}});setSel(s);setSelDay('Day A');setScreen('plan');};
  const startLog=()=>{setExercises(getPlan().map(name=>({name,sets:[{reps:'',weight:'',effort:''}]})));setOpenIdx(null);setScreen('log');};
  const addSet=ei=>{const u=[...exercises];u[ei].sets.push({reps:'',weight:'',effort:''});setExercises(u);};
  const updSet=(ei,si,f,v)=>{const u=[...exercises];u[ei].sets[si][f]=v;setExercises(u);};
  const getPrev=name=>logs.filter(l=>l.split===sel).flatMap(l=>(l.exercises||[]).filter(e=>e.name===name)).slice(-3);
  const getAI=ex=>{
    const h=getPrev(ex.name);
    const sc=(supplements||[]).filter(s=>!s.endDate||s.endDate>=today()).map(s=>s.name).join(',')||'none';
    if(!h.length){ai.ask(`Evidence-based strength coach. Exercise:${ex.name}. Supplements:${sc}. 3 sentences: recommended starting weight/rep scheme, how supplements affect this lift, weekly progression model.`);return;}
    ai.ask(`Strength coach. Exercise:"${ex.name}". History:${h.map(h=>h.sets.map(s=>`${s.weight||'?'}×${s.reps||'?'}`).join(',')).join(' → ')}. Supplements:${sc}. 4 sentences: increase weight? how much? optimal sets/reps? supplement impact on this lift?`);
  };
  const saveLog=async()=>{if(!exercises.length)return;await setLogs([...logs,{date:logDate,split:sel,day:selDay,exercises,id:Date.now()}]);setExercises([]);setScreen('select');};

  if(screen==='select')return(
    <>
      <div className="card">
        <div className="card-title">🏋 SELECT SPLIT</div>
        <div className="split-grid">
          {SPLITS.map(s=>(
            <div key={s} className="split-card" onClick={()=>openSplit(s)}>
              <div className="split-icon">{sIcon(s)}</div>
              <div className="split-name">{s}</div>
              <div className="split-count">{Object.keys(plans[s]||{}).length} variant(s) · {logs.filter(l=>l.split===s).length} sessions</div>
            </div>
          ))}
        </div>
      </div>
      {logs.length>0&&<div className="card">
        <div className="card-title">📅 RECENT SESSIONS</div>
        {[...logs].reverse().slice(0,6).map(log=>(
          <div key={log.id} className="li" style={{flexDirection:'column',alignItems:'flex-start'}}>
            <div style={{display:'flex',width:'100%',justifyContent:'space-between',alignItems:'center'}}>
              <div><div className="ld">{fmt(log.date)}</div><div style={{fontWeight:700,fontSize:15}}>{log.split} — {log.day}</div><div style={{fontSize:12,color:'#4a6080'}}>{(log.exercises||[]).length} exercises</div></div>
              <button className="btn btn-danger btn-small" onClick={()=>deleteLog(log.id)}>✕</button>
            </div>
          </div>
        ))}
      </div>}
    </>
  );

  if(screen==='plan')return(
    <>
      <button className="back-btn" onClick={()=>setScreen('select')}>← Back</button>
      <div className="card">
        <div className="card-title">📋 {sel?.toUpperCase()} — PLAN</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12,alignItems:'center'}}>
          {Object.keys(plans[sel]||{}).map(d=><div key={d} className={`day-tab${selDay===d?' active':''}`} onClick={()=>setSelDay(d)}>{d}</div>)}
          <div className="row" style={{flex:1,minWidth:150}}>
            <input className="input f1" placeholder="New day name..." value={newDay} onChange={e=>setNewDay(e.target.value)} style={{fontSize:12,padding:'6px 8px'}}/>
            <button className="btn btn-secondary btn-small" onClick={()=>{if(!newDay.trim())return;setPlans({...plans,[sel]:{...(plans[sel]||{}),[newDay.trim()]:[]}}); setSelDay(newDay.trim());setNewDay('');}}>+</button>
          </div>
        </div>
        <label className="sl">Add Any Exercise to {selDay}</label>
        <div className="row" style={{marginBottom:12}}>
          <input className="input f1" placeholder="Type any exercise name..." value={customEx} onChange={e=>setCustomEx(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&customEx.trim()){toggleEx(customEx.trim());setCustomEx('');}}}/>
          <button className="btn btn-primary btn-small" style={{whiteSpace:'nowrap',width:'auto'}} onClick={()=>{if(customEx.trim()){toggleEx(customEx.trim());setCustomEx('');}}}>+ Add</button>
        </div>
        <label className="sl">Quick Add — {sel} Presets</label>
        <div style={{display:'flex',flexWrap:'wrap',marginBottom:10}}>
          {(EX[sel]||EX.Push).filter(e=>!getPlan().includes(e)).map(ex=><span key={ex} className="chip" onClick={()=>toggleEx(ex)}>{ex}</span>)}
        </div>
        {getPlan().length>0&&<div style={{marginBottom:10}}>
          <label className="sl">In This Plan ({getPlan().length})</label>
          {getPlan().map(ex=>(
            <div key={ex} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #0f1e35'}}>
              <span style={{fontSize:13,fontWeight:600}}>{ex}</span>
              <button className="btn btn-danger btn-small" onClick={()=>toggleEx(ex)}>✕</button>
            </div>
          ))}
        </div>}
        <button className="btn btn-primary" onClick={startLog} disabled={!getPlan().length} style={{marginTop:12}}>START {selDay} →</button>
      </div>
    </>
  );

  return(
    <>
      <button className="back-btn" onClick={()=>setScreen('plan')}>← Back</button>
      <div className="card">
        <div className="card-title">⚡ {sel?.toUpperCase()} — {selDay}</div>
        <label className="sl">Session Date</label>
        <input type="date" className="input" value={logDate} onChange={e=>setLogDate(e.target.value)}/>
        <div className="row" style={{marginTop:10}}>
          <input className="input f1" placeholder="Add extra exercise..." value={customEx} onChange={e=>setCustomEx(e.target.value)} style={{fontSize:13}}/>
          <button className="btn btn-secondary btn-small" onClick={()=>{if(customEx){setExercises([...exercises,{name:customEx,sets:[{reps:'',weight:'',effort:''}]}]);setCustomEx('');setOpenIdx(exercises.length);}}}>+ Add</button>
        </div>
      </div>
      {exercises.map((ex,ei)=>{
        const prev=getPrev(ex.name);
        return(
          <div key={ex.name+ei} className="ex-row">
            <div className={`ex-hdr${openIdx===ei?' open':''}`} onClick={()=>setOpenIdx(openIdx===ei?null:ei)}>
              <div><div className="ex-nm">{ex.name}</div><div className="ex-mt">{ex.sets.length} sets · {prev.length>0?`${prev.length} prev sessions`:'No history'}</div></div>
              <span style={{color:'#2a3d58',fontSize:14}}>{openIdx===ei?'▲':'▼'}</span>
            </div>
            {openIdx===ei&&<div className="ex-body">
              {prev.length>0&&<div className="prev-box"><div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'#00c2ff',marginBottom:4,fontWeight:700}}>Previous Sessions</div>{prev.slice(-2).reverse().map((p,pi)=><div key={pi} style={{fontSize:12,color:'#3a5060',marginBottom:2}}>-{pi+1}: {p.sets.map((s,si)=>`S${si+1} ${s.weight||'?'}×${s.reps||'?'}`).join(' | ')}</div>)}</div>}
              <div style={{display:'grid',gridTemplateColumns:'24px 1fr 1fr 1fr auto',gap:5,marginBottom:4}}><div/>{['Reps','Weight','Effort'].map(l=><div key={l} style={{fontSize:9,color:'#2a3d58',textAlign:'center',textTransform:'uppercase',letterSpacing:1,fontWeight:700}}>{l}</div>)}<div/></div>
              {ex.sets.map((s,si)=>(
                <div key={si} className="set-grid">
                  <div className="set-num">{si+1}</div>
                  <input className="set-inp" type="number" placeholder="10" value={s.reps} onChange={e=>updSet(ei,si,'reps',e.target.value)}/>
                  <input className="set-inp" type="number" placeholder="135" value={s.weight} onChange={e=>updSet(ei,si,'weight',e.target.value)}/>
                  <input className="set-inp" type="number" placeholder="7" step="0.5" title="How hard 1-10. 10=max effort, 7=3 reps left" value={s.effort} onChange={e=>updSet(ei,si,'effort',e.target.value)}/>
                  <button style={{background:'none',border:'none',color:'#ff3d6b',cursor:'pointer',fontSize:14}} onClick={()=>{const u=[...exercises];if(u[ei].sets.length>1)u[ei].sets.splice(si,1);setExercises(u);}}>✕</button>
                </div>
              ))}
              <div className="row" style={{marginTop:8,flexWrap:'wrap',gap:6}}>
                <button className="btn btn-secondary btn-small" onClick={()=>addSet(ei)}>+ Set</button>
                <button className="btn btn-teal btn-small" onClick={()=>getAI(ex)}>◈ AI Advice</button>
                <button className="btn btn-danger btn-small" onClick={()=>{const u=[...exercises];u.splice(ei,1);setExercises(u);setOpenIdx(null);}}>Remove</button>
              </div>
              {openIdx===ei&&<AIBox ai={ai}/>}
            </div>}
          </div>
        );
      })}
      {exercises.length>0&&<button className="btn btn-primary" style={{marginTop:12}} onClick={saveLog}>💾 SAVE SESSION</button>}
    </>
  );
}

// NUTRITION TAB
function NutritionTab({nutrition,setNutrition,deleteNutrition,weights,scans,notes,goals,supplements}){
  const [date,setDate]=useState(today());
  const [form,setForm]=useState({calories:'',protein:'',carbs:'',fats:'',water:''});
  const ai=useAI();
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const save=async()=>{
    if(!form.calories)return;
    const entry={date,...form,id:`n-${date}-${Date.now()}`};
    await setNutrition([...nutrition.filter(n=>n.date!==date),entry].sort((a,b)=>a.date.localeCompare(b.date)));
    setForm({calories:'',protein:'',carbs:'',fats:'',water:''});
  };
  const latest=nutrition[nutrition.length-1];
  const latestScan=scans[scans.length-1];
  const latestWeight=weights[weights.length-1];
  const lmm=parseFloat(latestScan?.lmm)||null;
  const bw=parseFloat(latestWeight?.weight)||null;
  const hasData=latestScan&&lmm&&bw;
  const goal=goals?.primary||'recomp';
  const protT=hasData?Math.round(lmm*1.0):null;
  const calT=hasData?(goal==='cut'?Math.round(bw*14):goal==='bulk'?Math.round(bw*17):Math.round(bw*15.5)):null;
  const fatT=hasData?Math.round(bw*0.35):null;
  const carbT=hasData&&calT&&protT?Math.round((calT-protT*4-fatT*9)/4):null;
  const chart=nutrition.slice(-30).map(n=>({label:fmt(n.date),value:parseFloat(n.calories)||0}));
  const getAdvice=()=>{
    const r=nutrition.slice(-14);
    const avgC=r.length?Math.round(r.reduce((a,n)=>a+(parseFloat(n.calories)||0),0)/r.length):0;
    const avgP=r.length?Math.round(r.reduce((a,n)=>a+(parseFloat(n.protein)||0),0)/r.length):0;
    const wt=weights.slice(-14);const wch=wt.length>1?+(wt[wt.length-1].weight-wt[0].weight).toFixed(1):0;
    const sc=(supplements||[]).filter(s=>!s.endDate||s.endDate>=today()).map(s=>`${s.name} ${s.dose}${s.unit}`).join(',')||'none';
    const nc=notes.slice(-5).map(n=>`${n.date}:"${n.text}"`).join(';');
    ai.ask(`Evidence-based nutrition coach (Nippard/Ethier/Norton protocols). Data: avg cal:${avgC}, avg protein:${avgP}g, 14d weight change:${wch}lbs, scan:${latestScan?`${latestScan.weight}lbs ${latestScan.bf}%BF ${latestScan.lmm}lbs LMM`:'none'}, supplements:${sc}, notes:${nc||'none'}, goal:${goal}. 5 points: 1)calorie adjustment 2)protein target from lean mass 3)carb/fat split 4)supplement effects on nutrition needs 5)priority action. Specific numbers.`);
  };
  return(
    <>
      {hasData?(
        <div className="card">
          <div className="card-title">🎯 YOUR MACRO TARGETS</div>
          {[{label:'Protein',val:`${protT}g`,sub:'1g/lb lean mass',color:'#00e5a0',pct:latest?Math.min((parseFloat(latest.protein)||0)/protT*100,100):0},{label:'Calories',val:`${calT} kcal`,sub:`${goal} phase`,color:'#3d8bff',pct:latest?Math.min((parseFloat(latest.calories)||0)/calT*100,100):0},{label:'Fats',val:`${fatT}g`,sub:'0.35g/lb BW min',color:'#ff3d6b',pct:latest?Math.min((parseFloat(latest.fats)||0)/fatT*100,100):0},{label:'Carbs',val:`${carbT}g`,sub:'remainder',color:'#00c2ff',pct:latest?Math.min((parseFloat(latest.carbs)||0)/carbT*100,100):0},{label:'Water',val:`${bw?Math.round(bw):'—'}+ oz`,sub:'1oz/lb BW',color:'#4a9eff',pct:latest?Math.min((parseFloat(latest.water)||0)/Math.round(bw)*100,100):0}].map(m=>(
            <div key={m.label} className="mbar">
              <div className="mbar-lbl">{m.label}<div style={{fontSize:9,color:'#2a3d58',marginTop:1}}>{m.sub}</div></div>
              <div className="mbar-track"><div className="mbar-fill" style={{width:`${m.pct}%`,background:m.color}}/></div>
              <div className="mbar-val" style={{color:m.color}}>{m.val}</div>
            </div>
          ))}
        </div>
      ):(
        <div className="card">
          <div className="card-title">🎯 YOUR MACRO TARGETS</div>
          <div style={{textAlign:'center',padding:'20px 0',color:'#4a6080'}}>
            <div style={{fontSize:28,marginBottom:10}}>📊</div>
            <div style={{fontSize:13,marginBottom:6}}>Log a body scan first</div>
            <div style={{fontSize:11,lineHeight:1.6}}>Your personalized targets will appear here once you log your body composition in the <strong style={{color:'#3d8bff'}}>Body tab</strong>.</div>
          </div>
        </div>
      )}
      <div className="card">
        <div className="card-title">🍽 LOG NUTRITION</div>
        <label className="sl">Date</label>
        <input type="date" className="input" value={date} onChange={e=>setDate(e.target.value)}/>
        <div className="row" style={{marginTop:10}}>
          <div className="f1"><label className="sl">Calories</label><input type="number" className="input" placeholder={calT||'2400'} value={form.calories} onChange={e=>upd('calories',e.target.value)}/></div>
          <div className="f1"><label className="sl">Protein (g)</label><input type="number" className="input" placeholder={protT||'180'} value={form.protein} onChange={e=>upd('protein',e.target.value)}/></div>
        </div>
        <div className="row" style={{marginTop:8}}>
          <div className="f1"><label className="sl">Carbs (g)</label><input type="number" className="input" placeholder={carbT||'250'} value={form.carbs} onChange={e=>upd('carbs',e.target.value)}/></div>
          <div className="f1"><label className="sl">Fats (g)</label><input type="number" className="input" placeholder={fatT||'80'} value={form.fats} onChange={e=>upd('fats',e.target.value)}/></div>
          <div className="f1"><label className="sl">Water (oz)</label><input type="number" className="input" placeholder="100" value={form.water} onChange={e=>upd('water',e.target.value)}/></div>
        </div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={save}>LOG DAY</button></div>
      </div>
      {chart.length>1&&<div className="card"><div className="card-title">📈 CALORIE TREND</div><SimpleChart data={chart} color="#3d8bff"/></div>}
      <div className="card">
        <div className="card-title">◈ AI NUTRITION COACH</div>
        <div style={{fontSize:12,color:'#4a6080',marginBottom:10}}>Evidence-based recommendations using Nippard / Ethier / Norton protocols. Accounts for your supplements and goals.</div>
        <button className="btn btn-teal btn-small" style={{marginBottom:10}} onClick={getAdvice}>Get Personalized Plan</button>
        <AIBox ai={ai}/>
      </div>
      {nutrition.length>0&&<div className="card">
        <div className="card-title">📋 HISTORY</div>
        {[...nutrition].reverse().slice(0,14).map(n=>(
          <div key={n.id||n.date} className="li">
            <div><div className="ld">{fmt(n.date)}</div><div style={{fontWeight:700,fontSize:15}}>{n.calories}<span style={{color:'#4a6080',fontSize:12}}> kcal</span></div><div style={{fontSize:11,color:'#4a6080'}}>P:{n.protein}g C:{n.carbs}g F:{n.fats}g</div></div>
            <button className="btn btn-danger btn-small" onClick={()=>deleteNutrition(n.id,n.date)}>✕</button>
          </div>
        ))}
      </div>}
      {nutrition.length===0&&<div className="empty"><div className="empty-icon">🍽</div><div className="empty-txt">No nutrition logged yet.</div></div>}
    </>
  );
}

// BODY TAB
function BodyTab({scans,setScans,deleteScan,goals}){
  const [form,setForm]=useState({date:today(),weight:'',bf:'',lmm:'',height:'',goal_bf:''});
  const ai=useAI();
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const add=async()=>{if(!form.bf||!form.weight)return;await setScans([...scans,{...form,id:Date.now()}].sort((a,b)=>a.date.localeCompare(b.date)));setForm(f=>({...f,weight:'',bf:'',lmm:''}));};
  const latest=scans[scans.length-1];const prev=scans[scans.length-2];
  const goalBF=parseFloat(latest?.goal_bf)||parseFloat(goals?.targetBF)||10;
  const curBF=latest?parseFloat(latest.bf):null;
  const chart=scans.map(s=>({label:fmt(s.date),value:parseFloat(s.bf)}));
  const analyze=()=>{if(!latest)return;ai.ask(`Body comp coach. Scans:${scans.slice(-4).map(s=>`${s.date}:${s.weight}lbs,${s.bf}%BF,LMM:${s.lmm}lbs`).join('|')}. Goal:${goalBF}%BF. 4 sentences: trajectory, weeks to goal, muscle loss concern, one adjustment.`);};
  const r=38,c=2*Math.PI*r;const bfD=curBF?c*(1-Math.min(curBF/35,1)):c;
  return(
    <>
      <div className="card">
        <div className="card-title">📊 LOG BODY SCAN</div>
        <div className="row"><div className="f1"><label className="sl">Date</label><input type="date" className="input" value={form.date} onChange={e=>upd('date',e.target.value)}/></div><div className="f1"><label className="sl">Height (in)</label><input type="number" className="input" placeholder="70" value={form.height} onChange={e=>upd('height',e.target.value)}/></div></div>
        <div className="row" style={{marginTop:8}}><div className="f1"><label className="sl">Weight (lbs)</label><input type="number" className="input" placeholder="185" step="0.1" value={form.weight} onChange={e=>upd('weight',e.target.value)}/></div><div className="f1"><label className="sl">Body Fat %</label><input type="number" className="input" placeholder="18" step="0.1" value={form.bf} onChange={e=>upd('bf',e.target.value)}/></div></div>
        <div className="row" style={{marginTop:8}}><div className="f1"><label className="sl">Lean Mass (lbs)</label><input type="number" className="input" placeholder="148" step="0.1" value={form.lmm} onChange={e=>upd('lmm',e.target.value)}/></div><div className="f1"><label className="sl">BF% Goal</label><input type="number" className="input" placeholder="10" step="0.5" value={form.goal_bf} onChange={e=>upd('goal_bf',e.target.value)}/></div></div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={add}>LOG SCAN</button></div>
      </div>
      {latest&&<>
        <div className="card" style={{textAlign:'center'}}>
          <div className="card-title" style={{justifyContent:'center'}}>🎯 GOAL PROGRESS</div>
          <div style={{display:'flex',justifyContent:'center',marginBottom:10}}>
            <div style={{position:'relative',width:90,height:90}}>
              <svg width="90" height="90" viewBox="0 0 90 90"><circle cx="45" cy="45" r={r} fill="none" stroke="#0d1424" strokeWidth="7"/><circle cx="45" cy="45" r={r} fill="none" stroke="url(#bg2)" strokeWidth="7" strokeDasharray={c} strokeDashoffset={bfD} strokeLinecap="round" style={{transform:'rotate(-90deg)',transformOrigin:'45px 45px'}}/><defs><linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#1e6bff"/><stop offset="100%" stopColor="#00c2ff"/></linearGradient></defs></svg>
              <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}}>
                <div style={{fontFamily:'Orbitron,sans-serif',fontSize:20,fontWeight:700,color:'#3d8bff',lineHeight:1}}>{curBF}%</div>
                <div style={{fontSize:9,color:'#4a6080',textTransform:'uppercase',letterSpacing:1}}>Body Fat</div>
              </div>
            </div>
          </div>
          <div style={{fontSize:12,color:'#4a6080'}}>Goal: {goalBF}% · {curBF>goalBF?`${+(curBF-goalBF).toFixed(1)}% remaining`:'🎉 Goal hit!'}</div>
          <div style={{background:'#0d1424',borderRadius:4,height:8,overflow:'hidden',marginTop:10}}>
            <div style={{height:'100%',borderRadius:4,background:'linear-gradient(90deg,#1e6bff,#00c2ff)',width:`${Math.min(Math.max(0,((25-curBF)/(25-goalBF))*100),100)}%`}}/>
          </div>
        </div>
        <div className="sg">
          <div className="sb"><div className="sv">{latest.weight}</div><div className="slbl">lbs total</div></div>
          <div className="sb"><div className="sv" style={{color:'#00c2ff'}}>{latest.lmm||'—'}</div><div className="slbl">lbs lean</div></div>
          <div className="sb"><div className="sv" style={{color:prev&&latest.lmm&&parseFloat(latest.lmm)>=parseFloat(prev.lmm)?'#00e5a0':'#ff3d6b'}}>{prev&&latest.lmm?`${+(parseFloat(latest.lmm)-parseFloat(prev.lmm)).toFixed(1)>0?'+':''}${+(parseFloat(latest.lmm)-parseFloat(prev.lmm)).toFixed(1)}`:'—'}</div><div className="slbl">LMM Δ</div></div>
        </div>
      </>}
      {scans.length>1&&<div className="card"><div className="card-title">📉 BF% TREND</div><SimpleChart data={chart} color="#ff3d6b"/></div>}
      {latest&&<div className="card"><div className="card-title">◈ AI BODY ANALYSIS</div><button className="btn btn-teal btn-small" onClick={analyze} style={{marginBottom:10}}>Analyze Composition</button><AIBox ai={ai}/></div>}
      {scans.length>0&&<div className="card"><div className="card-title">📋 SCAN HISTORY</div>{[...scans].reverse().map(s=>(<div key={s.id} style={{background:'#0d1424',border:'1px solid #111d33',borderRadius:8,padding:12,marginBottom:8}}><div className="ld">{fmt(s.date)}</div><div style={{display:'flex',gap:14,marginTop:4,flexWrap:'wrap'}}><div><span style={{fontSize:11,color:'#4a6080'}}>Weight </span><strong>{s.weight} lbs</strong></div><div><span style={{fontSize:11,color:'#4a6080'}}>BF </span><strong style={{color:'#ff3d6b'}}>{s.bf}%</strong></div><div><span style={{fontSize:11,color:'#4a6080'}}>LMM </span><strong style={{color:'#00c2ff'}}>{s.lmm} lbs</strong></div></div><button className="btn btn-danger btn-small" style={{marginTop:8}} onClick={()=>deleteScan(s.id)}>Remove</button></div>))}</div>}
      {scans.length===0&&<div className="empty"><div className="empty-icon">📊</div><div className="empty-txt">No body scans logged yet.</div></div>}
    </>
  );
}

// GOALS TAB

  const ai=useAI();
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

              <div key={l.id} style={{background:'#0d1424',border:'1px solid #111d33',borderRadius:8,padding:12,marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{fontWeight:700,fontSize:14}}>{l.exercise}</div>
                  <button className="btn btn-danger btn-small" onClick={()=>removeLift(l.id)}>✕</button>
                </div>
                <div style={{fontSize:12,color:'#4a6080',marginTop:2}}>{l.currentMax} → {l.targetMax} {l.unit}{l.deadline?` · by ${fmt(l.deadline)}`:''}</div>
                <div style={{background:'#111d33',borderRadius:4,height:6,overflow:'hidden',marginTop:8}}>
                  <div style={{height:'100%',borderRadius:4,background:'linear-gradient(90deg,#1e6bff,#00c2ff)',width:`${pct}%`}}/>
                </div>
              </div>
            );
          })}
        </div>}
      </div>
      <div className="card">
        <div className="card-title">◈ AI GOAL PLAN</div>
        <div style={{fontSize:12,color:'#4a6080',marginBottom:10}}>Get a personalized plan based on your goals, current stats, and supplement stack.</div>
        <button className="btn btn-primary" onClick={getPlan}>Generate My Plan</button>
        <AIBox ai={ai}/>
      </div>
    </>
  );
}

// NOTES TAB
function NotesTab({notes,setNotes,deleteNote}){
  const [date,setDate]=useState(today());
  const [text,setText]=useState('');
  const [tag,setTag]=useState('General');
  const [importing,setImporting]=useState(false);
  const [importTxt,setImportTxt]=useState('');
  const ai=useAI();
  const TAGS=['General','Supplement','Peptide','Training','Diet','Health','PR'];
  const tc=t=>({Supplement:'tag-teal',Peptide:'tag-blue',PR:'tag-green',Health:'tag-red'}[t]||'tag-blue');
  const add=async()=>{if(!text.trim())return;await setNotes([...notes,{date,text:text.trim(),tag,id:Date.now()}]);setText('');};
  const parseImport=()=>{
    if(!importTxt.trim())return;
    ai.ask(`Fitness data parser. User pasted their previous tracking notes. Extract and summarize: 1)weight entries (date+weight) 2)workout sessions (date, exercises, sets/reps/weight) 3)body composition (BF%, lean mass) 4)supplement/peptide info 5)nutrition data 6)PRs 7)health notes. Format clearly labeled. Notes:\n${importTxt.slice(0,3000)}`);
  };
  const saveImport=async()=>{if(!ai.result)return;await setNotes([...notes,{date:today(),text:`IMPORTED DATA:\n${ai.result}`,tag:'General',id:Date.now()}]);setImportTxt('');ai.setResult(null);setImporting(false);};

  if(importing)return(
    <>
      <button className="back-btn" onClick={()=>setImporting(false)}>← Back</button>
      <div className="card">
        <div className="card-title">📥 IMPORT PREVIOUS NOTES</div>
        <div style={{fontSize:12,color:'#4a6080',marginBottom:12,lineHeight:1.6}}>Paste any previous tracking notes, workout logs, or journal entries. AI will extract and structure your data.</div>
        <label className="sl">Paste Your Notes</label>
        <textarea className="input" style={{minHeight:200,fontSize:13}} placeholder="Paste anything — workout logs, weight entries, supplement notes, body scan results..." value={importTxt} onChange={e=>setImportTxt(e.target.value)}/>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={parseImport}>◈ Parse with AI</button></div>
        <AIBox ai={ai}/>
        {ai.result&&<div className="row" style={{marginTop:10,gap:8}}><button className="btn btn-primary f1" onClick={saveImport}>Save as Note</button><button className="btn btn-secondary" onClick={()=>ai.setResult(null)}>Retry</button></div>}
      </div>
    </>
  );

  return(
    <>
      <button className="btn btn-teal btn-small" style={{marginBottom:12,width:'100%'}} onClick={()=>setImporting(true)}>📥 Import Previous Notes</button>
      <div className="card">
        <div className="card-title">📝 ADD NOTE</div>
        <div style={{fontSize:12,color:'#4a6080',marginBottom:12}}>Log events like starting creatine, peptide changes, illness, PRs — AI uses these to explain data shifts.</div>
        <div className="row">
          <div className="f1"><label className="sl">Date</label><input type="date" className="input" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div style={{width:110}}><label className="sl">Tag</label><select className="input" value={tag} onChange={e=>setTag(e.target.value)}>{TAGS.map(t=><option key={t}>{t}</option>)}</select></div>
        </div>
        <div style={{marginTop:10}}><label className="sl">Note</label><textarea className="input" placeholder="e.g. Started creatine 5g/day — expect 3-5lb water weight gain..." value={text} onChange={e=>setText(e.target.value)}/></div>
        <div style={{marginTop:12}}><button className="btn btn-primary" onClick={add}>SAVE NOTE</button></div>
      </div>
      {notes.length>0&&<div className="card"><div className="card-title">📋 ALL NOTES</div>{[...notes].reverse().map(n=>(<div key={n.id} style={{background:'#0d1424',borderLeft:'3px solid #1e6bff',borderRadius:'0 8px 8px 0',borderTop:'1px solid #111d33',borderRight:'1px solid #111d33',borderBottom:'1px solid #111d33',padding:'10px 12px',marginBottom:8}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><div><div className="ld">{fmt(n.date)}</div><span className={`tag ${tc(n.tag)}`} style={{marginBottom:6,display:'inline-block'}}>{n.tag}</span><div style={{fontSize:13,color:'#e8f0ff',lineHeight:1.5,marginTop:4}}>{n.text}</div></div><button className="btn btn-danger btn-small" style={{marginLeft:8,flexShrink:0}} onClick={()=>deleteNote(n.id)}>✕</button></div></div>))}</div>}
      {notes.length===0&&<div className="empty"><div className="empty-icon">📝</div><div className="empty-txt">No notes yet.</div></div>}
    </>
  );
}

// INSIGHTS TAB
function InsightsTab({weights,logs,scans,peptides,nutrition,notes,goals,supplements}){
  const ai=useAI();
  const thisWeek=logs.filter(l=>Math.round((new Date()-new Date(l.date+'T12:00:00'))/86400000)<=7).length;
  const activeP=peptides.filter(p=>!p.endDate||p.endDate>=today());
  const activeS=supplements.filter(s=>!s.endDate||s.endDate>=today());
  const latest=scans[scans.length-1];
  const avgCal=nutrition.slice(-7).length?Math.round(nutrition.slice(-7).reduce((a,n)=>a+(parseFloat(n.calories)||0),0)/nutrition.slice(-7).length):0;
  const wt7=weights.slice(-7);const wch=wt7.length>1?+(wt7[wt7.length-1].weight-wt7[0].weight).toFixed(1):null;
  const brief=()=>{
    const wt=weights.slice(-14).map(w=>`${w.date}:${w.weight}lbs`).join(',');
    const scan=latest?`${latest.weight}lbs,${latest.bf}%BF,${latest.lmm}lbs LMM`:'none';
    const stack=[...activeP.map(p=>`${p.name}(peptide)`), ...activeS.map(s=>`${s.name}(supp)`)].join(',')||'none';
    const nc=notes.slice(-6).map(n=>`${n.date}[${n.tag}]:${n.text}`).join('|')||'none';
    ai.ask(`Elite fitness coach full analysis. Weight 14d:${wt}. Scan:${scan}. Stack:${stack}. Avg cal 7d:${avgCal}kcal. Training:${thisWeek}/week,${logs.length}total. Goal:${goals?.primary||'not set'}. Notes:${nc}. 5-point brief: 1)TRAJECTORY 2)TRAINING 3)NUTRITION 4)PROTOCOL 5)PRIORITY ACTION. Specific numbers.`);
  };
  const ir=(icon,bg,title,body)=>(
    <div style={{display:'flex',gap:10,padding:'10px 0',borderBottom:'1px solid #111d33'}}>
      <div style={{width:34,height:34,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0,marginTop:2,background:bg}}>{icon}</div>
      <div><div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{title}</div><div style={{fontSize:12,color:'#3a5070',lineHeight:1.5}}>{body}</div></div>
    </div>
  );
  return(
    <>
      <div className="sg"><div className="sb"><div className="sv">{logs.length}</div><div className="slbl">Sessions</div></div><div className="sb"><div className="sv">{thisWeek}</div><div className="slbl">This Week</div></div><div className="sb"><div className="sv" style={{color:'#00c2ff'}}>{activeP.length+activeS.length}</div><div className="slbl">On Stack</div></div></div>
      <div className="sg"><div className="sb"><div className="sv" style={{color:wch<0?'#00e5a0':wch>0?'#ff3d6b':'#4a6080'}}>{wch!==null?(wch>0?`+${wch}`:wch):'—'}</div><div className="slbl">7d Wt Δ</div></div><div className="sb"><div className="sv">{avgCal||'—'}</div><div className="slbl">Avg kcal</div></div><div className="sb"><div className="sv" style={{color:'#ff3d6b'}}>{latest?.bf?`${latest.bf}%`:'—'}</div><div className="slbl">Last BF%</div></div></div>
      <div className="card">
        <div className="card-title">💡 AUTO INSIGHTS</div>
        {ir('⚖','rgba(30,107,255,0.12)','Weight Trend',wch!==null?`7-day: ${wch>0?'+':''}${wch} lbs. ${Math.abs(wch)<=1.5?'Rate looks sustainable.':Math.abs(wch)>2.5?'Rate is aggressive — verify muscle retention.':'Slightly high — monitor closely.'}`:'Log at least 7 weigh-ins.')}
        {ir('🏋','rgba(0,194,255,0.12)','Training',thisWeek>=5?`${thisWeek}/7 days — excellent.`:thisWeek>=3?`${thisWeek}/7 days — push toward 5-6.`:`${thisWeek}/7 days — aim for 5-6 days/week.`)}
        {ir('🍽','rgba(0,229,160,0.12)','Nutrition',avgCal>0?`7-day avg: ${avgCal} kcal. ${wch>1?'Rising — consider cutting 150-200 kcal.':wch<-1.5?'Dropping fast — check protein.':'Calibrated.'}`:'Log nutrition to get recommendations.')}
        {ir('💊','rgba(0,194,255,0.12)','Stack',activeP.length+activeS.length>0?`Active: ${[...activeP.map(p=>p.name),...activeS.map(s=>s.name)].join(', ')}.`:'No active stack logged.')}
        {notes.length>0&&ir('📝','rgba(30,107,255,0.12)','Latest Note',`${notes[notes.length-1]?.text?.slice(0,100)}${notes[notes.length-1]?.text?.length>100?'…':''}`)}
        {goals?.primary&&ir('🎯','rgba(30,107,255,0.12)','Goal',`Primary: ${goals.primary}${goals.targetBF?` · Target BF: ${goals.targetBF}%`:''}${goals.targetLMM?` · Target LMM: ${goals.targetLMM}lbs`:''}`)}
      </div>
      <div className="card">
        <div className="card-title">◈ FULL AI BRIEF</div>
        <div style={{fontSize:12,color:'#4a6080',marginBottom:10}}>Synthesizes all your data — weight, workouts, nutrition, body scans, stack, and notes.</div>
        <button className="btn btn-teal btn-small" style={{marginBottom:8,width:'100%'}} onClick={()=>ai.ask('Say exactly this: AI is working correctly.')}>🧪 Test AI Connection</button>
        <button className="btn btn-primary" onClick={brief}>GENERATE COACHING BRIEF</button>
        <AIBox ai={ai}/>
      </div>
    </>
  );
}

// MAIN APP
function App(){
  const [session,setSession]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState(0);
  const [weights,setWeightsS]=useState([]);
  const [logs,setLogsS]=useState([]);
  const [plans,setPlansS]=useState({});
  const [nutrition,setNutritionS]=useState([]);
  const [scans,setScansS]=useState([]);
  const [peptides,setPeptidesS]=useState([]);
  const [supplements,setSupplementsS]=useState([]);
  const [notes,setNotesS]=useState([]);
  const [goals,setGoalsS]=useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setSession(session);setLoading(false);});
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{if(session)loadAll();},[session]);

  const uid=()=>session?.user?.id;

  const loadAll=async()=>{
    const u=uid();if(!u)return;
    try{
      const [w,l,p,n,s,pep,nt,supp,gl]=await Promise.all([
        sb.from('weights').select('*').eq('user_id',u).order('date'),
        sb.from('workout_logs').select('*').eq('user_id',u).order('date'),
        sb.from('workout_plans').select('*').eq('user_id',u).single(),
        sb.from('nutrition').select('*').eq('user_id',u).order('date'),
        sb.from('body_scans').select('*').eq('user_id',u).order('date'),
        sb.from('peptides').select('*').eq('user_id',u).order('start_date'),
        sb.from('notes').select('*').eq('user_id',u).order('date'),
        sb.from('supplements').select('*').eq('user_id',u).order('start_date'),
        sb.from('user_goals').select('*').eq('user_id',u).single(),
      ]);
      if(w.data)setWeightsS(w.data);
      if(l.data)setLogsS(l.data.map(r=>({...r,exercises:r.exercises||[]})));
      if(p.data)setPlansS(p.data.plans||{});
      if(n.data)setNutritionS(n.data);
      if(s.data)setScansS(s.data);
      if(pep.data)setPeptidesS(pep.data.map(r=>({...r,startDate:r.start_date,endDate:r.end_date})));
      if(nt.data)setNotesS(nt.data);
      if(supp.data)setSupplementsS(supp.data.map(r=>({...r,startDate:r.start_date,endDate:r.end_date})));
      if(gl.data)setGoalsS(gl.data.goals||null);
    }catch(e){console.error('loadAll:',e);}
  };

  const uid_=()=>session?.user?.id;
  const setWeights=async rows=>{setWeightsS(rows);try{await sb.from('weights').upsert(rows.map(r=>({...r,user_id:uid_()})),{});}catch(e){console.error(e);}};
  const deleteWeight=async date=>{setWeightsS(w=>w.filter(x=>x.date!==date));try{await sb.from('weights').delete().eq('user_id',uid_()).eq('date',date);}catch(e){}};
  const setLogs=async rows=>{setLogsS(rows);try{await sb.from('workout_logs').upsert(rows.map(r=>({...r,user_id:uid_(),exercises:r.exercises||[]})),{});}catch(e){console.error(e);}};
  const deleteLog=async id=>{setLogsS(l=>l.filter(x=>x.id!==id));try{await sb.from('workout_logs').delete().eq('id',id).eq('user_id',uid_());}catch(e){}};
  const setPlans=async p=>{setPlansS(p);try{await sb.from('workout_plans').upsert({user_id:uid_(),plans:p},{});}catch(e){console.error(e);}};
  const setNutrition=async rows=>{setNutritionS(rows);try{await sb.from('nutrition').upsert(rows.map(r=>({...r,user_id:uid_(),id:r.id||`n-${r.date}-${uid_()}`})),{});}catch(e){console.error(e);}};
  const deleteNutrition=async(id,date)=>{setNutritionS(n=>n.filter(x=>(x.id||x.date)!==(id||date)));try{if(id)await sb.from('nutrition').delete().eq('id',id).eq('user_id',uid_());else await sb.from('nutrition').delete().eq('date',date).eq('user_id',uid_());}catch(e){}};
  const setScans=async rows=>{setScansS(rows);try{await sb.from('body_scans').upsert(rows.map(r=>({id:r.id,user_id:uid_(),date:r.date,weight:r.weight,bf:r.bf,lmm:r.lmm,height:r.height,goal_bf:r.goal_bf})),{});}catch(e){console.error('scans:',e);}};
  const deleteScan=async id=>{setScansS(s=>s.filter(x=>x.id!==id));try{await sb.from('body_scans').delete().eq('id',id).eq('user_id',uid_());}catch(e){}};
  const setPeptides=async rows=>{setPeptidesS(rows);try{const mapped=rows.map(r=>({id:r.id,user_id:uid_(),name:r.name,dose:r.dose,unit:r.unit,freq:r.freq,start_date:r.startDate||r.start_date,end_date:r.endDate||r.end_date||null,notes:r.notes}));await sb.from('peptides').upsert(mapped,{});}catch(e){console.error('peptides:',e);}};
  const deletePeptide=async id=>{setPeptidesS(p=>p.filter(x=>x.id!==id));try{await sb.from('peptides').delete().eq('id',id).eq('user_id',uid_());}catch(e){}};
  const setSupplements=async rows=>{setSupplementsS(rows);try{const mapped=rows.map(r=>({id:r.id,user_id:uid_(),name:r.name,dose:r.dose,unit:r.unit,freq:r.freq,start_date:r.startDate||r.start_date,end_date:r.endDate||r.end_date||null,notes:r.notes}));await sb.from('supplements').upsert(mapped,{});}catch(e){console.error('supplements:',e);}};
  const deleteSupplement=async id=>{setSupplementsS(s=>s.filter(x=>x.id!==id));try{await sb.from('supplements').delete().eq('id',id).eq('user_id',uid_());}catch(e){}};
  const setNotes=async rows=>{setNotesS(rows);try{await sb.from('notes').upsert(rows.map(r=>({...r,user_id:uid_()})),{});}catch(e){console.error(e);}};
  const deleteNote=async id=>{setNotesS(n=>n.filter(x=>x.id!==id));try{await sb.from('notes').delete().eq('id',id).eq('user_id',uid_());}catch(e){}};
  const setGoals=async g=>{setGoalsS(g);try{await sb.from('user_goals').upsert({user_id:uid_(),goals:g},{});}catch(e){console.error(e);}};

  const TABS=[{icon:'⚖',label:'Weight'},{icon:'🏋',label:'Train'},{icon:'🍽',label:'Nutrition'},{icon:'📊',label:'Body'},{icon:'💉',label:'Stack'},{icon:'🎯',label:'Goals'},{icon:'📝',label:'Notes'},{icon:'💡',label:'Insights'}];

  if(loading)return(<div style={{minHeight:'100vh',background:'#000',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{fontFamily:'Rajdhani,sans-serif',color:'#1e6bff',fontSize:14,letterSpacing:3,textTransform:'uppercase'}}>Loading...</div></div>);
  if(!session)return <AuthScreen/>;

  return(
    <div className="app">
      <div className="header">
        <div className="header-inner">
          <div><div className="logo">LEVELUP</div><div className="logo-sub">Performance Tracker</div></div>
          <div className="header-right"><div className="live-dot">Live</div><button className="signout-btn" onClick={()=>sb.auth.signOut()}>Sign Out</button></div>
        </div>
      </div>
      <div className="content">
        {tab===0&&<WeightTab weights={weights} setWeights={setWeights} deleteWeight={deleteWeight} notes={notes}/>}
        {tab===1&&<WorkoutTab logs={logs} setLogs={setLogs} deleteLog={deleteLog} plans={plans} setPlans={setPlans} supplements={supplements}/>}
        {tab===2&&<NutritionTab nutrition={nutrition} setNutrition={setNutrition} deleteNutrition={deleteNutrition} weights={weights} scans={scans} notes={notes} goals={goals} supplements={supplements}/>}
        {tab===3&&<BodyTab scans={scans} setScans={setScans} deleteScan={deleteScan} goals={goals}/>}
        {tab===4&&<StackTab peptides={peptides} setPeptides={setPeptides} deletePeptide={deletePeptide} supplements={supplements} setSupplements={setSupplements} deleteSupplement={deleteSupplement}/>}
        {tab===5&&<GoalsTab goals={goals} setGoals={setGoals} logs={logs} scans={scans} weights={weights} supplements={supplements}/>}
        {tab===6&&<NotesTab notes={notes} setNotes={setNotes} deleteNote={deleteNote}/>}
        {tab===7&&<InsightsTab weights={weights} logs={logs} scans={scans} peptides={peptides} nutrition={nutrition} notes={notes} goals={goals} supplements={supplements}/>}
      </div>
      <div className="tabs">
        {TABS.map((t,i)=>(
          <button key={i} className={`tab${tab===i?' active':''}`} onClick={()=>setTab(i)}>
            <span className="tab-icon">{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
